<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordSheet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8a96e;--gold-dim:#c8a96e55;--gold-faint:#c8a96e18;--bg:#0f0c08;--text:#e8e0d0;--text-dim:#e8e0d055;--text-mid:#e8e0d088;--red:#e88060;--purple:#c4a0e8}
html,body{height:100%;background:var(--bg);background-image:radial-gradient(ellipse at 20% 20%,#1f1508 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,#120d04 0%,transparent 60%);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden;position:fixed;width:100%}
#app{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--gold-faint);flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.logo-icon{font-size:22px;color:var(--gold)}
.logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
.hdr-btns{display:flex;gap:6px;align-items:center}
.screen{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;overflow:hidden;animation:fadeIn .4s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero-jp{display:block;font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(24px,4vw,46px);letter-spacing:.04em}
.hero-en{display:block;font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(36px,7vw,72px);color:var(--gold);letter-spacing:-.02em;line-height:1}
.hero-sub{color:var(--text-dim);font-size:13px;margin:10px 0 28px;letter-spacing:.06em}
.igroup{width:100%;max-width:500px;display:flex;flex-direction:column;gap:10px}
input[type=text]{background:#ffffff08;border:1px solid #c8a96e33;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;padding:13px 18px;border-radius:6px;outline:none;transition:border .2s;width:100%}
input[type=text]:focus{border-color:#c8a96e88;background:#ffffff10}
input[type=text]::placeholder{color:var(--text-dim)}
.key-hint{font-size:12px;color:var(--text-dim);line-height:1.7}
.key-hint a{color:var(--gold);text-decoration:none}
.model-row{display:flex;gap:8px}
select{flex:1;background:#1a1410;border:1px solid #c8a96e33;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:10px 14px;border-radius:6px;outline:none;cursor:pointer}
select option{background:#1a1410}
.btn-primary{background:linear-gradient(135deg,#c8a96e,#a07840);color:#1a1208;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.08em;border:none;border-radius:4px;padding:13px 28px;cursor:pointer;transition:filter .2s;width:100%}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:none;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.06em;border-radius:4px;padding:9px 16px;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn-ghost:hover{background:#c8a96e11}
.btn-ghost:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{font-size:11px;padding:7px 12px;opacity:.7}
.btn-row{display:flex;gap:10px;margin-top:18px}
.btn-row .btn-ghost,.btn-row .btn-primary{flex:1}
.card{background:#ffffff06;border:1px solid #c8a96e22;border-radius:12px;padding:26px 30px;width:100%;max-width:480px}
.card-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;opacity:.8;margin-bottom:16px}
.confirm-bar{border-left:3px solid var(--gold);padding-left:16px}
.confirm-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;line-height:1.2;margin-bottom:5px}
.confirm-artist{font-size:14px;color:var(--text-mid);margin-bottom:10px}
.confirm-meta{display:flex;flex-wrap:wrap;gap:10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim)}
.bpm-badge{color:var(--gold)}
.spinner{width:34px;height:34px;border:3px solid #c8a96e33;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Space Mono',monospace;color:var(--gold);font-size:13px;letter-spacing:.1em}
.loading-sub{color:var(--text-dim);font-size:12px;margin-top:7px}
.msg{font-size:12px;margin-top:10px;text-align:center;line-height:1.5;min-height:18px}
.error{color:var(--red)}
#screen-display{padding:0;align-items:stretch;justify-content:flex-start}
.song-header{padding:14px 24px 10px;border-bottom:1px solid #c8a96e12;flex-shrink:0}
.song-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.song-artist{color:var(--text-dim);font-size:12px;margin-top:2px}
.song-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.bpm-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);background:#c8a96e15;border:1px solid #c8a96e33;border-radius:20px;padding:2px 10px}
.capo-tag{display:none;font-family:'Space Mono',monospace;font-size:10px;color:var(--purple);background:#9b6fd422;border:1px solid #9b6fd444;border-radius:20px;padding:2px 10px}
.controls{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:8px 24px;background:#ffffff04;border-bottom:1px solid #c8a96e10;flex-shrink:0}
.speed-group{display:flex;align-items:center;gap:5px}
.speed-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-right:3px}
.speed-btn{background:none;border:1px solid #c8a96e44;color:#c8a96e99;font-family:'Space Mono',monospace;font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;transition:all .2s}
.speed-btn:hover,.speed-btn.active{background:#c8a96e22;border-color:var(--gold);color:var(--gold)}
.scroll-btn{background:linear-gradient(135deg,#c8a96e,#a07840);color:#1a1208;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.08em;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;transition:filter .2s}
.scroll-btn:hover{filter:brightness(1.1)}
.action-bar{display:flex;gap:8px;padding:8px 24px;background:#ffffff03;border-bottom:1px solid #c8a96e08;flex-shrink:0;flex-wrap:wrap;align-items:center}
.action-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid #c8a96e33;color:var(--text-mid);font-family:'Space Mono',monospace;font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
.action-btn:hover{background:#c8a96e11;border-color:var(--gold-dim);color:var(--text)}
.action-btn.fav-saved{border-color:#c8a96e;color:var(--gold);background:#c8a96e11}
.action-btn.reroll-btn:hover{background:#ffffff08}
#chord-sources{display:none;padding:8px 24px;background:#ffffff03;border-bottom:1px solid #c8a96e08;flex-shrink:0;font-size:11px}
.lyrics-outer{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.lyrics-inner{padding:20px 24px;max-width:700px;margin:0 auto}
.section-label{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold);font-size:13px;letter-spacing:.15em;text-transform:uppercase;margin:20px 0 8px;opacity:.8}
.line-block{margin-bottom:11px}
.chord-line{font-family:'Space Mono',monospace;color:var(--gold);font-size:13px;letter-spacing:.08em;min-height:18px;white-space:pre}
.lyric-line{font-size:16px;line-height:1.6;letter-spacing:.04em}
.lyrics-end{height:80px}
#screen-favorites{padding:0;align-items:stretch;justify-content:flex-start}
.fav-header{padding:16px 24px;border-bottom:1px solid var(--gold-faint);flex-shrink:0;display:flex;align-items:center;gap:12px}
.fav-title-text{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;flex:1}
.fav-list{flex:1;overflow-y:auto;padding:12px}
.fav-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-dim);gap:10px;font-size:14px}
.fav-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid #c8a96e18;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .2s;background:#ffffff04}
.fav-item:hover{background:#c8a96e0a;border-color:#c8a96e33}
.fav-item-info{flex:1;min-width:0}
.fav-item-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-item-artist{font-size:12px;color:var(--text-dim);margin-top:2px}
.fav-item-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:4px}
.fav-delete{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .2s;flex-shrink:0}
.fav-delete:hover{color:var(--red);background:#e8806011}
.fav-share{background:none;border:1px solid #c8a96e33;color:var(--gold);font-family:'Space Mono',monospace;font-size:10px;padding:4px 8px;border-radius:12px;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap}
.fav-share:hover{background:#c8a96e11}
.shared-banner{background:#4a2e6e33;border-bottom:1px solid #9b6fd433;padding:8px 24px;flex-shrink:0;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--purple);font-family:'Space Mono',monospace}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1410;border:1px solid #c8a96e44;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;padding:10px 20px;border-radius:8px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
.chord-tap{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;text-decoration-color:var(--gold-dim);transition:color .15s,text-decoration-color .15s}
.chord-tap:hover,.chord-tap:active{color:#fff;text-decoration-color:#fff}
#chord-modal{display:none;position:fixed;inset:0;background:#000000cc;z-index:1000;align-items:center;justify-content:center;padding:20px}
#chord-modal.show{display:flex}
.chord-modal-card{background:#1a1208;border:1px solid var(--gold-dim);border-radius:16px;padding:24px 28px;text-align:center;animation:fadeIn .2s ease;min-width:200px}
.chord-modal-name{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--text);margin-bottom:16px;letter-spacing:.02em}
.chord-modal-nodata{font-size:12px;color:var(--text-dim);font-family:'Space Mono',monospace;padding:24px 0}
.chord-modal-close{margin-top:16px;background:none;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;padding:7px 22px;border-radius:20px;cursor:pointer;transition:background .2s}
.chord-modal-close:hover{background:#c8a96e11}
.result-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid #c8a96e18;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .2s;background:#ffffff04}
.result-item:hover{background:#c8a96e0a;border-color:#c8a96e44}
.result-num{font-family:'Space Mono',monospace;font-size:13px;color:var(--gold);opacity:.6;width:20px;flex-shrink:0;text-align:center}
.result-info{flex:1;min-width:0}
.result-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700}
.result-artist{font-size:13px;color:var(--text-mid);margin-top:2px}
.result-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:4px}
.result-arrow{color:var(--gold-dim);font-size:18px;flex-shrink:0}
@media print{
  .header,.controls,.action-bar,#chord-sources,.speed-btn,.scroll-btn,#back-btn,#fav-nav-btn,button,#toast,.shared-banner{display:none!important}
  body{background:#fff!important;color:#000!important;overflow:auto!important}
  #app{height:auto!important}
  .screen{display:none!important}
  #screen-display{display:block!important;height:auto!important;overflow:visible!important}
  .lyrics-outer{overflow:visible!important;height:auto!important}
  .song-header{border:none!important;padding:0 0 8px!important}
  .song-title{color:#000!important;font-size:20px!important}
  .song-artist{color:#555!important}
  .bpm-tag,.capo-tag{background:#eee!important;color:#333!important;border-color:#ccc!important}
  .section-label{color:#666!important;font-size:11px!important}
  .chord-line{color:#c8a96e!important;font-size:11px!important}
  .lyric-line{color:#000!important;font-size:14px!important}
  .lyrics-end{display:none!important}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo" onclick="goHome()"><span class="logo-icon">♩</span><span class="logo-text">ChordSheet</span></div>
    <div class="hdr-btns">
      <button class="btn-ghost btn-sm" id="back-btn" style="display:none" onclick="goHome()">← 戻る</button>
      <button class="btn-ghost btn-sm" id="fav-nav-btn" onclick="showFavorites()" style="display:none">★ お気に入り</button>
      <button class="btn-ghost btn-sm" onclick="changeApiKey()">🔑 設定</button>
    </div>
  </div>

  <div class="screen active" id="screen-apikey">
    <div style="text-align:center;margin-bottom:26px">
      <span class="hero-jp">はじめに</span>
      <span class="hero-en" style="font-size:clamp(26px,5vw,50px)">APIキー設定</span>
    </div>
    <div class="igroup">
      <div style="position:relative">
        <input type="password" id="api-key-input" placeholder="APIキーを貼り付け" autocomplete="off" spellcheck="false" style="padding-right:48px">
        <button onclick="toggleKeyVisible()" id="eye-btn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gold);font-size:18px;padding:4px;opacity:0.7">👁</button>
      </div>
      <p class="key-hint">Google Gemini APIキーが必要です（無料）。<br><a href="https://aistudio.google.com/apikey" target="_blank">↗ aistudio.google.com/apikey</a> で発行できます。</p>
      <div class="model-row">
        <select id="model-select"><option value="gemini-3-flash-preview">gemini-2.5-flash-lite（デフォルト）</option></select>
        <button class="btn-ghost" id="fetch-btn" onclick="fetchModels()" style="padding:9px 14px;font-size:12px">↻ モデル一覧</button>
      </div>
      <button class="btn-primary" onclick="saveApiKey()">保存して始める →</button>
      <p class="msg" id="apikey-msg"></p>
    </div>
  </div>

  <div class="screen" id="screen-search">
    <div style="text-align:center;margin-bottom:8px">
      <span class="hero-jp">コード譜を</span>
      <span class="hero-en">instantly.</span>
    </div>
    <p class="hero-sub">曲名を入力するだけで歌詞とギターコードを表示します</p>
    <div class="igroup" style="margin-bottom:0">
      <input type="text" id="search-input" placeholder="曲名を入力（例: チェックのワンピース）" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn-primary" id="search-btn" onclick="doSearch()">検索する</button>
    </div>
    <p class="msg error" id="search-error" style="margin:6px 0 0"></p>
    <div style="margin-top:16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="flex:1;height:1px;background:var(--gold-faint)"></div>
        <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim)">または</span>
        <div style="flex:1;height:1px;background:var(--gold-faint)"></div>
      </div>
      <input type="text" id="url-input" placeholder="コード譜サイトのURLを貼り付け（ChordWiki / U-フレット等）" onkeydown="if(event.key==='Enter')doFetchUrl()" style="margin-bottom:6px">
      <button class="btn-ghost" id="url-btn" onclick="doFetchUrl()">🔗 URLから取得</button>
      <button class="btn-ghost" id="paste-btn" onclick="showPasteScreen()" style="margin-top:6px">📋 コピペして登録</button>
    </div>
    <div id="debug-panel" style="display:none;margin-top:18px;width:100%;max-width:500px;background:#ffffff06;border:1px solid #c8a96e33;border-radius:8px;padding:12px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-mid);text-align:left;max-height:240px;overflow-y:auto;white-space:pre-wrap;word-break:break-all"></div>
    <div id="library-section" style="margin-top:24px"></div>
  </div>

  <div class="screen" id="screen-paste">
    <h2 style="font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);margin-bottom:8px">コード譜を登録</h2>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:14px">ChordWikiのページを開いて、コード譜エリアをコピー（長押し→全選択→コピー）して、下に貼り付けてください。</p>
    <div class="igroup">
      <input type="text" id="paste-title" placeholder="曲名（必須）">
      <input type="text" id="paste-artist" placeholder="アーティスト名">
      <input type="number" id="paste-bpm" placeholder="BPM（任意、例: 120）" min="40" max="240">
      <input type="number" id="paste-capo" placeholder="カポ（任意、例: 0）" min="0" max="12">
      <textarea id="paste-content" placeholder="ChordWikiからコピペした内容を貼り付け" style="width:100%;min-height:240px;background:rgba(20,16,10,0.6);border:1px solid var(--gold-faint);border-radius:8px;padding:12px;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;resize:vertical"></textarea>
      <button class="btn-primary" onclick="savePastedSong()">保存して表示</button>
      <button class="btn-ghost" onclick="showScreen('search')">キャンセル</button>
    </div>
    <p class="msg error" id="paste-error"></p>
  </div>

  <div class="screen" id="screen-confirm">
    <div class="card">
      <p class="card-label">この曲で合っていますか？</p>
      <div class="confirm-bar">
        <div class="confirm-title" id="confirm-title"></div>
        <div class="confirm-artist" id="confirm-artist"></div>
        <div class="confirm-meta"><span id="confirm-year"></span><span id="confirm-genre"></span><span class="bpm-badge" id="confirm-bpm"></span></div>
      </div>
      <div class="btn-row">
        <button class="btn-ghost" onclick="goHome()">違う曲を探す</button>
        <button class="btn-primary" onclick="doConfirm()">この曲でOK ✓</button>
      </div>
    </div>
    <p class="msg error" id="confirm-error"></p>
  </div>

  <div class="screen" id="screen-results" style="padding:0;align-items:stretch;justify-content:flex-start">
    <div style="padding:16px 24px;border-bottom:1px solid var(--gold-faint);flex-shrink:0;display:flex;align-items:center;gap:12px">
      <div style="flex:1">
        <div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700">検索結果</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px" id="results-query"></div>
      </div>
      <button class="btn-ghost btn-sm" onclick="goHome()">← 戻る</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:12px" id="results-list"></div>
  </div>

  <div class="screen" id="screen-loading">
    <div class="spinner"></div>
    <p class="loading-text" id="loading-text">コード譜を検索中...</p>
    <p class="loading-sub" id="loading-sub"></p>
  </div>

  <div class="screen" id="screen-display">
    <div id="shared-banner" class="shared-banner" style="display:none">
      📎 保存済みコード譜を表示中 — <span id="shared-info"></span>
    </div>
    <div class="song-header">
      <div class="song-title" id="disp-title"></div>
      <div class="song-artist" id="disp-artist"></div>
      <div class="song-tags">
        <div class="bpm-tag" id="disp-bpm"></div>
        <div class="capo-tag" id="disp-capo"></div>
      </div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--text-dim);font-family:'Space Mono',monospace">キー</span>
        <div id="key-btns" style="display:flex;gap:4px">
          <button class="key-btn active" data-shift="0" onclick="setKeyShift(0)">0</button>
          <button class="key-btn" data-shift="-1" onclick="setKeyShift(-1)">-1</button>
          <button class="key-btn" data-shift="-2" onclick="setKeyShift(-2)">-2</button>
          <button class="key-btn" data-shift="-3" onclick="setKeyShift(-3)">-3</button>
          <button class="key-btn" data-shift="-4" onclick="setKeyShift(-4)">-4</button>
          <button class="key-btn" data-shift="-5" onclick="setKeyShift(-5)">-5</button>
        </div>
        <span id="key-capo-hint" style="font-size:11px;color:var(--gold);font-family:'Space Mono',monospace"></span>
      </div>
    </div>
    <div class="controls">
      <div class="speed-group">

async function callGemini(msgs,sys,useSearch=false,attempt=0){
  const body={
    system_instruction:{parts:[{text:sys}]},
    contents:msgs.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]})),
    generationConfig:{maxOutputTokens:8192,temperature:0.3}
  };
  if(useSearch)body.tools=[{google_search:{}}];
  const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+apiKey,{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
  });
  const raw=await r.text();
  let d;try{d=JSON.parse(raw)}catch{throw new Error('パース失敗: '+raw.slice(0,80))}
  const errMsg=d?.error?.message||'';
  const isRetryable=!r.ok&&(r.status===429||r.status===503||errMsg.includes('high demand')||errMsg.includes('overload')||errMsg.includes('Resource exhausted'));
  if(isRetryable&&attempt<2){
    const wait=5000*(attempt+1);
    document.getElementById('loading-sub').textContent='混雑中のためリトライ中... ('+(attempt+1)+'/2)';
    await new Promise(res=>setTimeout(res,wait));
    return callGemini(msgs,sys,useSearch,attempt+1);
  }
  if(!r.ok||d.error)throw new Error(errMsg||'HTTP '+r.status);
  const parts=d.candidates?.[0]?.content?.parts||[];
  const text=parts.filter(p=>p.text&&!p.thought).map(p=>p.text).join('');
  const meta=d.candidates?.[0]?.groundingMetadata||{};
  const chunks=meta.groundingChunks||[];
  const sources=chunks.map(c=>c.web).filter(Boolean).map(w=>({title:w.title||'',uri:w.uri||''}));
  const searchQueries=meta.webSearchQueries||[];
  return {text,sources,searchQueries};
}

  if(s!==-1&&e>s)try{return JSON.parse(c.slice(s,e+1))}catch{}
  return null;
}

function stripChordWikiHeader(raw){
  if(!raw)return raw;
  const lines=raw.split('\n');
  const headerEndPatterns=[/歌[：:]/,/作詞[・・]/,/作曲[：:]/,/[Cc]apo/,/BPM/];
  let headerEnd=-1;
  for(let i=0;i<lines.length;i++){
    const t=lines[i].trim();
    if(!t)continue;
    if(headerEndPatterns.some(p=>p.test(t))){headerEnd=i;break;}
  }
  if(headerEnd<0)return raw;
  return lines.slice(headerEnd).join('\n');
}

function parsePastedChordSheet(raw,capo){
  raw=stripChordWikiHeader(raw);
  const chordProRe=new RegExp('\\[[A-G][^\\]]{0,10}\\]');
  if(chordProRe.test(raw))return parseChordProText(raw,capo);
  const rawLines=raw.replace(/\r/g,'').split('\n');
  const sections=[];
  let curSection={label:'',lines:[]};
  let pendingChord=null;
  const secWords='イントロ|intro|aメロ|bメロ|cメロ|サビ|chorus|プリサビ|bridge|ブリッジ|間奏|interlude|outro|アウトロ|ending|エンディング|solo|ソロ|verse';
  const secRe=new RegExp('^[\\s\\-=【\\[(]*\\s*('+secWords+')\\s*\\d*[\\s\\-=】\\])]*$','i');
  const chordRe=new RegExp('^[\\s]*((?:[A-G][#b]?(?:m|maj|min|sus|aug|dim|add|M)?\\d{0,2}(?:\\([^)]+\\))?(?:\\/[A-G][#b]?)?[\\s|]*)+)$');
  function flushChord(){if(pendingChord){curSection.lines.push({chords:pendingChord,lyric:''});pendingChord=null;}}
  function pushSection(label){flushChord();if(curSection.lines.length>0||curSection.label)sections.push(curSection);curSection={label:label||'',lines:[]};}
  for(let i=0;i<rawLines.length;i++){
    const trimmed=rawLines[i].trim();
    if(!trimmed){flushChord();continue;}
    const secM=trimmed.match(secRe);
    if(secM){pushSection(normalizeSection(secM[1]));continue;}
    if(chordRe.test(trimmed)){flushChord();pendingChord=trimmed.replace(/\s+/g,'  ');continue;}
    if(pendingChord){curSection.lines.push({chords:pendingChord,lyric:trimmed});pendingChord=null;}
    else{curSection.lines.push({chords:'',lyric:trimmed});}
  }
  flushChord();
  if(curSection.lines.length>0||curSection.label)sections.push(curSection);
  const cleaned=sections.filter(s=>s.lines.length>0);
  if(cleaned.length===0)return null;
  if(!cleaned[0].label)cleaned[0].label='Verse';
  return{capo:capo||0,sections:cleaned};
}

function normalizeSection(label){
  const l=label.toLowerCase();
  if(/intro|イントロ/i.test(l))return'イントロ';
  if(/aメロ/i.test(l)||/^verse\s*1?$/i.test(l))return'Aメロ';
  if(/bメロ/i.test(l)||/^verse\s*2$/i.test(l))return'Bメロ';
  if(/cメロ/i.test(l))return'Cメロ';
  if(/プリ|pre\s*chorus/i.test(l))return'プリサビ';
  if(/サビ|chorus/i.test(l))return'サビ';
  if(/bridge|ブリッジ/i.test(l))return'ブリッジ';
  if(/間奏|interlude/i.test(l))return'間奏';
  if(/outro|アウトロ|ending|エンディング/i.test(l))return'アウトロ';
  if(/solo|ソロ/i.test(l))return'ソロ';
  return label;
}

function parseChordProText(raw,capo){
  const rawLines=raw.replace(/\r/g,'').split('\n');
  const sections=[];
  let cur={label:'',lines:[]};
  const secWords2='イントロ|aメロ|bメロ|cメロ|サビ|プリサビ|間奏|アウトロ|verse|chorus|bridge|intro|outro|interlude|solo';
  const secRe2=new RegExp('^\\[?\\s*('+secWords2+')\\s*\\d*\\s*\\]?$','i');
  for(const line of rawLines){
    const t=line.trim();
    if(!t)continue;
    const secM=t.match(secRe2)||t.match(/\{(?:start_of_|comment:?)\s*([^}]+)\}/i);
    if(secM){if(cur.lines.length>0)sections.push(cur);cur={label:normalizeSection(secM[1]),lines:[]};continue;}
    const chordRe2=new RegExp('\\[([^\\]]+)\\]([^\\[]*)','g');
    const chords=[];let lyric='';let m2,hasChord=false;
    while((m2=chordRe2.exec(t))!==null){hasChord=true;chords.push(m2[1]);lyric+=m2[2];}
    if(!hasChord)cur.lines.push({chords:'',lyric:t});
    else cur.lines.push({chords:chords.join('  '),lyric:lyric.trim()});
  }
  if(cur.lines.length>0)sections.push(cur);
  if(sections.length===0)return null;
  if(!sections[0].label)sections[0].label='Verse';
  return{capo:capo||0,sections};
}

const NOTES_S=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTES_F=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
function noteIdx(n){let i=NOTES_S.indexOf(n);if(i>=0)return i;return NOTES_F.indexOf(n);}
function shiftNote(n,s){const i=noteIdx(n);if(i<0)return n;const ni=((i+s)%12+12)%12;return s<0?NOTES_F[ni]:NOTES_S[ni];}
function transposeChord(chord,s){
  if(!chord||s===0)return chord;
  chord=chord.trim();if(!chord)return chord;
  const m=chord.match(/^([A-G][#b]?)((?:m|M|maj|min|sus|aug|dim|add|[0-9]|\(|\))*)((?:\/[A-G][#b]?)?)$/);
  if(!m)return chord;
  return shiftNote(m[1],s)+m[2]+(m[3]?'/'+shiftNote(m[3].slice(1),s):'');
}

let currentKeyShift=0;
function setKeyShift(shift){
  currentKeyShift=shift;
  document.querySelectorAll('.key-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.shift)===shift));
  const origCapo=currentChordData?currentChordData.capo||0:0;
  const rawCapo=origCapo+shift;
  const newCapo=Math.max(0,rawCapo);
  const chordShift=rawCapo-newCapo;
  const hint=document.getElementById('key-capo-hint');
  if(hint){
    if(shift===0)hint.textContent='';
    else if(chordShift===0)hint.textContent='カポ '+newCapo+' (元: '+origCapo+')';
    else hint.textContent='カポ '+newCapo+' + コード'+chordShift+'半音';
  }
  if(currentChordData)renderTransposed(currentChordData,newCapo,chordShift);
}

function renderTransposed(data,newCapo,chordShift){
  const transposed={capo:newCapo,sections:data.sections.map(sec=>({label:sec.label,lines:sec.lines.map(line=>({chords:line.chords?line.chords.split(/\s{2,}|\s+/).map(c=>transposeChord(c,chordShift)).join('  '):'',lyric:line.lyric||''}))}))}; 
  renderDisplay(transposed,currentSources,false,true);
}

async function doSearch(){
  const raw=document.getElementById('search-input').value.trim();
  if(!raw)return;
  document.getElementById('search-error').textContent='';
  const libMatches=searchLibrary(raw);
  if(libMatches.length===1){openLibrarySong(libMatches[0].id);return;}
  if(libMatches.length>1){showResultsList(raw,libMatches.map(s=>({title:s.songInfo.title,artist:s.songInfo.artist,bpm:s.songInfo.bpm,_libId:s.id})));return;}
  const q=encodeURIComponent(raw);
  document.getElementById('search-error').innerHTML='「'+esc(raw)+'」はまだ登録されていません。<br><span style="color:var(--text-dim);font-size:11px;display:block;margin-top:6px">下の「📋 ChordWikiからコピペして登録」から追加してください。</span><div style="margin-top:10px;font-size:12px"><a href="https://ja.chordwiki.org/search.html?q='+q+'" target="_blank" style="color:var(--gold)">→ ChordWikiで検索 ↗</a></div>';
}

async function fetchWithProxy(url){
  const WORKER='https://chordsheet-proxy.shiba2520.workers.dev/?url=';
  let r;
  try{r=await fetch(WORKER+encodeURIComponent(url),{signal:AbortSignal.timeout(15000)});}
  catch(e){throw new Error('Worker接続失敗: '+e.message.slice(0,60));}
  const t=await r.text();
  if(!t||t.length<200)throw new Error('Worker応答短すぎ(status='+r.status+',len='+t.length+')');
  if(t.startsWith('fetch error'))throw new Error('Worker fetch失敗: '+t.slice(0,60));
  if(t.startsWith('url param'))throw new Error('WorkerパラメータエラーURL確認を');
  return t;
}

// サイト判定 → { key, label }
function detectChordSite(url){
  const h=(()=>{try{return new URL(url).hostname}catch{return ''}})();
  if(/chordwiki\.org/i.test(h))return{key:'chordwiki',label:'ChordWiki'};
  if(/u-fret\.com/i.test(h))return{key:'ufret',label:'U-フレット'};
  if(/chord-rinne\.jp/i.test(h))return{key:'rinne',label:'リンネのコードブック'};
  return{key:'generic',label:h||'外部サイト'};
}

async function doFetchUrl(){
  const url=document.getElementById('url-input').value.trim();
  if(!url){document.getElementById('search-error').textContent='URLを入力してください';return;}
  if(!/^https?:\/\//i.test(url)){document.getElementById('search-error').textContent='http(s)から始まるURLを入力してください';return;}
  const site=detectChordSite(url);
  const btn=document.getElementById('url-btn');
  btn.disabled=true;btn.textContent='取得中...';
  document.getElementById('search-error').textContent='';
  document.getElementById('loading-text').textContent=site.label+'から取得中...';
  document.getElementById('loading-sub').textContent='HTMLを取得中...';
  showScreen('loading');
  hideDebugPanel();
  window._csLastDebug={build:CS_BUILD,url,site:site.key,stage:'fetch開始',time:new Date().toLocaleString('ja-JP')};
  try{
    let html=null,proxyErr='';
    try{html=await fetchWithProxy(url);}catch(e){proxyErr=e.message;}

    // ── HTML取得失敗 → Geminiフォールバックへ ──
    if(!html||html.length<500){
      Object.assign(window._csLastDebug,{stage:'HTML取得失敗',proxyErr,htmlLen:html?html.length:0});
      document.getElementById('loading-sub').textContent='直接アクセス失敗。AIで取得を試みています...';
      const ok=await fetchViaGeminiFallback(url,site);
      if(ok)return;
      document.getElementById('search-error').innerHTML='アクセス失敗: '+esc(proxyErr||'不明なエラー')+'<br><a href="'+url+'" target="_blank" style="color:var(--gold)">→ 元ページを直接開く ↗</a>';
      renderDebugPanel();
      showScreen('search');return;
    }

    document.getElementById('loading-sub').textContent='コード譜を解析中...';
    const doc=new DOMParser().parseFromString(html,'text/html');
    const bodyText=doc.body.textContent||'';

    let pageTitle='';
    if(site.key==='chordwiki'){
      pageTitle=decodeURIComponent((url.split('/wiki/').pop()||'').replace(/[?#].*$/u,'')).trim();
    }
    const h1=doc.querySelector('h1,h2');
    if(h1&&h1.textContent.trim())pageTitle=h1.textContent.trim().slice(0,80);
    if(!pageTitle){
      const t=doc.querySelector('title');
      if(t&&t.textContent.trim())pageTitle=t.textContent.trim().split(/[\|\-–—]/)[0].trim().slice(0,80);
    }

    let artist='';
    const m=bodyText.match(new RegExp('歌[\uff1a\uff0f:]\s*([^\r\n]{1,40})'))
      ||bodyText.match(new RegExp('アーティスト[\uff1a:]\s*([^\r\n]{1,40})'))
      ||bodyText.match(new RegExp('作曲[者]?[\uff1a:]\s*([^\r\n]{1,40})'));
    if(m)artist=m[1].trim();

    let capo=0;
    const capoMatch=bodyText.match(/[Cc]apo[^0-9\n]{0,10}([0-9]{1,2})/);
    if(capoMatch)capo=parseInt(capoMatch[1]);

    let bpm=null;
    const bpmMatch=bodyText.match(/BPM[：:\s]*([0-9]+)/i);
    if(bpmMatch)bpm=parseInt(bpmMatch[1]);

    // ── リンネのコードブック(chord-rinne.jp): メタ情報は固定のDOM構造から正確に取得 ──
    if(site.key==='rinne'){
      const tEl=doc.querySelector('#bodytitle,p.title');
      if(tEl&&tEl.textContent.trim())pageTitle=tEl.textContent.trim().slice(0,80);
      const aEl=doc.querySelector('a.artist');
      if(aEl&&aEl.textContent.trim())artist=aEl.textContent.trim().slice(0,40);
      capo=0;
      const selOpt=doc.querySelector('#key_selectbox option[selected]');
      if(selOpt){
        const cm=selOpt.textContent.match(/[Cc]apo\s*([0-9０-９]+)/);
        if(cm)capo=parseInt(cm[1].replace(/[０-９]/g,d=>String('０１２３４５６７８９'.indexOf(d))))||0;
      }
      const bpmEl=doc.querySelector('#id_bpm');
      if(bpmEl){const bm=bpmEl.textContent.match(/([0-9]+)/);if(bm)bpm=parseInt(bm[1]);}
    }
    if(isNaN(capo)||capo<0||capo>12)capo=0;

    let chordData=extractChordDataFromDOM(doc,capo,site.key);
    const gotAnyChord=chordData&&chordData.sections&&chordData.sections.some(s=>s.lines.some(l=>l.chords&&l.chords.trim()));

    // ── デバッグ情報を保持（失敗時に表示） ──
    Object.assign(window._csLastDebug,{
      stage:gotAnyChord?'DOM解析成功':'DOM解析でコード0件',
      htmlLen:html.length,
      title:pageTitle,artist,capo,bpm,
      sectionsCount:chordData?(chordData.sections||[]).length:0,
      gotAnyChord,
      sampleChords:chordData?(chordData.sections||[]).flatMap(s=>s.lines.map(l=>l.chords).filter(Boolean)).slice(0,5):[],
      sampleLyrics:chordData?(chordData.sections||[]).flatMap(s=>s.lines.map(l=>l.lyric).filter(Boolean)).slice(0,3):[],
      bodyTextSample:bodyText.slice(0,300)
    });

    // ── DOM解析失敗（コード0件を含む） → Geminiフォールバックへ ──
    if(!chordData||!chordData.sections||chordData.sections.length===0||!gotAnyChord){
      document.getElementById('loading-sub').textContent='コードが検出できず。AIで再解析しています...';
      const ok=await fetchViaGeminiFallback(url,site);
      if(ok)return;
      document.getElementById('search-error').innerHTML='コード譜の解析に失敗しました（コードを検出できませんでした）。<br><a href="'+url+'" target="_blank" style="color:var(--gold)">→ 元ページを直接確認 ↗</a>';
      renderDebugPanel();
      showScreen('search');return;
    }

    const id='song_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    const newSong={id,addedAt:Date.now(),songInfo:{title:pageTitle||'unknown',artist:artist||'',bpm:bpm||120},chordData};
    let lib=loadLibrary();
    const existing=findInLibrary(pageTitle,artist);
    if(existing)lib=lib.filter(s=>s.id!==existing.id);
    lib.push(newSong);saveLibrary(lib);
    songInfo=newSong.songInfo;baseSpeed=bpmSpd(bpm||120);
    currentChordData=chordData;
    currentSources={sources:[{uri:url,title:site.label}],searchQueries:[]};
    isViewingFavorite=false;
    renderDisplay(chordData,currentSources);showScreen('display');showToast('✓ 取得・登録しました');
  }catch(e){
    if(window._csLastDebug)Object.assign(window._csLastDebug,{stage:'例外発生',error:e.message});
    document.getElementById('search-error').textContent='エラー: '+e.message;
    renderDebugPanel();
    showScreen('search');
  }
  finally{btn.disabled=false;btn.textContent='🔗 URLから取得';}
}

  const d=window._csLastDebug;
  if(!d)return null;
  return 'build: '+(d.build||CS_BUILD)
    +'\n時刻: '+(d.time||'')
    +'\nURL: '+(d.url||'')
    +'\nサイト判定: '+(d.site||'')
    +'\n段階: '+(d.stage||'')
    +(d.error?'\nエラー: '+d.error:'')
    +(d.proxyErr?'\nプロキシエラー: '+d.proxyErr:'')
    +'\nHTML長: '+(d.htmlLen!=null?d.htmlLen:'-')
    +'\nタイトル: '+(d.title||'-')+' / アーティスト: '+(d.artist||'-')
    +'\nカポ: '+(d.capo!=null?d.capo:'-')+' / BPM: '+(d.bpm!=null?d.bpm:'-')
    +'\nセクション数: '+(d.sectionsCount!=null?d.sectionsCount:'-')
    +'\nコード検出: '+(d.gotAnyChord?'あり':'なし')
    +'\n\n検出コード例:\n'+((d.sampleChords||[]).join('\n')||'(なし)')

    +'\n\nbody先頭300文字:\n'+(d.bodyTextSample||'');
}
function renderDebugPanel(){
  const el=document.getElementById('debug-panel');
  if(!el)return;
  const t=buildDebugText();
  if(!t){el.style.display='none';return;}
  el.textContent='🔍 取得デバッグ情報\n'+t;
  el.style.display='';
}
function hideDebugPanel(){
  const el=document.getElementById('debug-panel');
  if(el)el.style.display='none';
}
function showDebugInfo(){
  const t=buildDebugText();
  if(!t){alert('デバッグ情報がありません（このセッションでURL取得を実行していません）');return;}
  console.log(t);
  alert(t);
}

// HTML直接取得・DOM解析が両方失敗した場合、Geminiにページ内容の取得とJSON化を任せる
async function fetchViaGeminiFallback(url,site){
  if(!apiKey)return false;
  try{
    const prompt='次のURLのギターコード譜ページにアクセスして、その内容を忠実にJSON化してください: '+url
      +'\n\n出力形式（マークダウン不要、JSONのみ）:\n'
      +'{"title":"曲名","artist":"アーティスト名","bpm":120,"capo":0,"sections":[{"label":"イントロ","lines":[{"chords":"Em7  G/B","lyric":""},{"chords":"Em7","lyric":"歌詞"}]}]}\n\n'
      +'重要なルール:\n'
      +'・ページに実際に書かれている内容のみを反映、推測や創作は厳禁\n'
      +'・コードは1行、その下に対応する歌詞行のペアで記録\n'
      +'・歌詞のみの行は chords を空文字列に\n'
      +'・コードのみの行（イントロ等）は lyric を空文字列に\n'
      +'・全セクション（イントロ・Aメロ・サビ・アウトロ等）と全歌詞を漏らさない\n'
      +'・繰り返し記号は展開せずそのままセクションラベルに記録\n'
      +'・カポ情報があれば capo に整数で（なければ0）\n'
      +'・タイトル/アーティスト/BPMが不明な場合は空文字列または0でよい\n'
      +'・ふりがな・ルビ（漢字の読み仮名）は歌詞に含めない（例:「別べつの人ひと」ではなく「別の人」と書く）\n'
      +'・サイトのメニュー・UI文言（ジャンル一覧、Transpose、Glider capo、原曲BPM、ランキング、注意書き等）は歌詞に含めない';
    const result=await callGemini(
      [{role:'user',content:prompt}],
      'Access the given URL directly (or via search if needed) and extract chord and lyric data EXACTLY as written on the actual page. NEVER invent, summarize, or paraphrase content. Return ONLY complete valid JSON.',
      true
    );
    let data=null;
    const txt=result.text.replace(/```json/g,'').replace(/```/g,'').trim();
    try{data=JSON.parse(txt);}catch{}
    if(!data){const s=txt.indexOf('{'),e=txt.lastIndexOf('}');if(s!==-1&&e>s)try{data=JSON.parse(txt.slice(s,e+1));}catch{}}
    if(!data||!data.sections||data.sections.length===0){
      if(window._csLastDebug)Object.assign(window._csLastDebug,{stage:'Geminiフォールバック失敗（JSON解析不可）',geminiTextSample:(result.text||'').slice(0,200)});
      return false;
    }
    if(window._csLastDebug)Object.assign(window._csLastDebug,{stage:'Geminiフォールバック成功'});

    const chordData={capo:data.capo||0,sections:data.sections};
    const id='song_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    const newSong={id,addedAt:Date.now(),songInfo:{title:data.title||'unknown',artist:data.artist||'',bpm:data.bpm||120},chordData};
    let lib=loadLibrary();
    const existing=findInLibrary(newSong.songInfo.title,newSong.songInfo.artist);
    if(existing)lib=lib.filter(s=>s.id!==existing.id);
    lib.push(newSong);saveLibrary(lib);

    songInfo=newSong.songInfo;baseSpeed=bpmSpd(newSong.songInfo.bpm||120);
    currentChordData=chordData;
    currentSources={sources:[{uri:url,title:site.label+'（AI解析）'}],searchQueries:[]};
    isViewingFavorite=false;
    renderDisplay(chordData,currentSources);showScreen('display');
    showToast('✓ AIで解析・登録しました');
    return true;
  }catch(e){
    if(window._csLastDebug)Object.assign(window._csLastDebug,{stage:'Geminiフォールバック例外',error:e.message});
    console.warn('Geminiフォールバック失敗:',e.message);
    return false;
  }
}

function extractChordDataFromDOM(doc,capo,siteKey){
  // ── リンネのコードブック専用: コードは<img alt>属性・歌詞はルビ付き<td>のため、
  //    テキストベースのクリーンアップより先に固定の表構造から抽出する ──
  if(siteKey==='rinne'||doc.querySelector('table.lyric img[src*="daia/"]')){
    const rn=extractRinneDOM(doc,capo);
    if(rn&&rn.sections&&rn.sections.length>0)return rn;
  }

  // ── ナビゲーション・広告・UI要素を除去（リンク集・ジャンルメニュー・SNSボタン等も含む） ──
  doc.querySelectorAll('nav,header,footer,.ad,iframe,noscript,select,input,button,ul.menu,#ranking,#search-form,.rating,.tag,.breadcrumb,script,style,.genre,.category,.menu,.navi,.sidebar,.side,aside,.share,.sns,.pagination,.pager,.related,.recommend,.banner').forEach(el=>el.remove());

  // ── リンクの羅列（ジャンルメニュー等）を除去: <a>が密集している親要素ごと消す ──
  doc.querySelectorAll('a').forEach(a=>{
    const parent=a.parentElement;
    if(parent){
      const linkCount=parent.querySelectorAll('a').length;
      const totalLen=(parent.textContent||'').length;
      const linkLen=[...parent.querySelectorAll('a')].reduce((s,x)=>s+((x.textContent||'').length),0);
      // 親要素の文字の大半がリンクテキストならメニューとみなす
      if(linkCount>=3&&totalLen>0&&linkLen/totalLen>0.6){parent.remove();}
    }
  });

  // ── ルビ（ふりがな）除去: <rt>/<rp>タグの中身を本文から除く ──
  doc.querySelectorAll('rt,rp').forEach(el=>el.remove());

  // ── ChordPro形式のtextarea（ChordWiki等） ──
  const textarea=doc.querySelector('textarea');
  if(textarea){
    const src=textarea.value||textarea.textContent||'';
    if(src.includes('['))return parseChordProText(src,capo);
  }

  doc.querySelectorAll('script,style,nav,header,footer,.ad,iframe,noscript,a').forEach(el=>{
    // 単独のコード表記らしきリンクは残す（サイトによってはコードがaタグの場合があるため）
    const t=(el.textContent||'').trim();
    const isChordLike=/^[A-G][#b]?(?:m|maj|min|sus|aug|dim|add|M)?[0-9]{0,2}(?:\([^)]+\))?(?:\/[A-G][#b]?)?$/.test(t)&&t.length<15;
    if(el.tagName.toLowerCase()==='a'&&!isChordLike){el.remove();}
    else if(el.tagName.toLowerCase()!=='a'){el.remove();}
  });

  // ── UI文言・注意書きの行をテキストレベルで除外するためのブラックリスト ──
  const noiseLinePatterns=[
    /^(洋楽|邦楽|ボカロ|ドラマ・映画|アニメ|劇場.{0,6}アニメ|CM|童謡・民謡|J-?POP|K-?POP)$/,
    /^Copyright\s*©/i,
    /^Glider\s*capo/i,
    /^\(?Transpose\)?$/i,
    /^かんたん[:：]?$/,
    /^\(?Easy\)?$/i,
    /^D-navi/i,
    /iPhoneで表示が崩れる/,
    /^原曲BPM/,
    /全て表示|全体表示|印刷用|この曲を|もっと見る|ランキング|人気の曲/,
  ];

  // ── U-フレット専用: コードはspan.chord、歌詞はテキストノード ──
  if(siteKey==='ufret'){
    const ufResult=extractUfretDOM(doc,capo);
    if(ufResult&&ufResult.sections&&ufResult.sections.length>0)return ufResult;
  }

  // ── 汎用DOM抽出（クラス名に'chord'を含む要素、または単独コードトークンをコードとみなす） ──
  const sections=[];let curSection={label:'',lines:[]};let chordBuf=[],lyricBuf='';
  function flush(){if(chordBuf.length>0||lyricBuf.trim()){curSection.lines.push({chords:chordBuf.join('  '),lyric:lyricBuf.trim()});chordBuf=[];lyricBuf='';}}
  function pushSection(label){flush();if(curSection.lines.length>0)sections.push(curSection);curSection={label,lines:[]};}
  // 単独コードトークン判定（例: Em7, F#dim, B/D#, C#m など）
  const soloChordRe=new RegExp('^[A-G][#b]?(?:m|maj|min|sus|aug|dim|add|M)?[0-9]{0,2}(?:\\([^)]+\\))?(?:/[A-G][#b]?)?$');
  function isNoiseLine(t){return noiseLinePatterns.some(p=>p.test(t));}
  function walkNode(node){
    if(node.nodeType===3){
      const txt=node.textContent||'';
      const parts=txt.split('\n');
      for(let i=0;i<parts.length;i++){
        if(i>0)flush();
        const p=parts[i].trim();
        if(p&&!isNoiseLine(p))lyricBuf+=parts[i];
      }
      return;
    }
    if(node.nodeType!==1)return;
    const tag=node.tagName.toLowerCase();const cls=(node.className||'').toLowerCase();const txt=node.textContent.trim();
    if(isNoiseLine(txt))return;
    if(/^h[1-6]$/.test(tag)||cls.includes('section')||cls.includes('block-title')||cls.includes('midashi')){const sec=normalizeSection(txt);if(txt.length<30){pushSection(sec);return;}}
    // クラス名に'chord'を含む要素、またはspan/b/strongで中身が単独コードトークンならコードとみなす
    if(txt.length<15&&soloChordRe.test(txt)&&(cls.includes('chord')||/^(span|b|strong|em)$/.test(tag))){chordBuf.push(txt);return;}
    if(tag==='br'){flush();return;}
    if(/^(div|p|li|tr|td|section|article)$/.test(tag)){for(const child of node.childNodes)walkNode(child);flush();return;}
    for(const child of node.childNodes)walkNode(child);
  }
  const main=doc.querySelector('#chord,#chord_area,.chord_area,#main,main')||doc.body;
  for(const child of main.childNodes)walkNode(child);
  flush();if(curSection.lines.length>0)sections.push(curSection);
  let cleaned=sections.filter(s=>s.lines.some(l=>l.chords||l.lyric));

  // ── DOM抽出でコードが1つも取れなかった場合: プレーンテキストのコード行/歌詞行パターンで再試行 ──
  const hasAnyChord=cleaned.some(s=>s.lines.some(l=>l.chords));
  if(cleaned.length===0||!hasAnyChord){
    const rawText=(doc.body.textContent||'').split('\n').filter(line=>!isNoiseLine(line.trim())).join('\n');
    const textResult=parsePastedChordSheet(rawText,capo);
    if(textResult&&textResult.sections&&textResult.sections.some(s=>s.lines.some(l=>l.chords))){
      return textResult;
    }
    if(cleaned.length===0)return textResult;
  }
  if(!cleaned[0].label)cleaned[0].label='イントロ';
  return{capo:capo||0,sections:cleaned};
}

// U-フレット専用抽出: コードは <span class="chord..."> 系、歌詞はその周辺のテキスト行
function extractUfretDOM(doc,capo){
  const sections=[];let curSection={label:'',lines:[]};let chordBuf=[],lyricBuf='';
  function flush(){if(chordBuf.length>0||lyricBuf.trim()){curSection.lines.push({chords:chordBuf.join('  '),lyric:lyricBuf.trim()});chordBuf=[];lyricBuf='';}}
  function pushSection(label){flush();if(curSection.lines.length>0)sections.push(curSection);curSection={label,lines:[]};}
  function walkNode(node){
    if(node.nodeType===3){
      const txt=node.textContent||'';
      const parts=txt.split('\n');
      for(let i=0;i<parts.length;i++){if(i>0)flush();if(parts[i].trim())lyricBuf+=parts[i];}
      return;
    }
    if(node.nodeType!==1)return;
    const tag=node.tagName.toLowerCase();
    const cls=(node.className||'').toLowerCase();
    const txt=node.textContent.trim();
    if(/^h[1-6]$/.test(tag)||cls.includes('midashi')||cls.includes('section')){
      if(txt.length<30){pushSection(normalizeSection(txt));return;}
    }
    if(cls.includes('chord')&&/^[A-G][#b]?/.test(txt)&&txt.length<15){chordBuf.push(txt);return;}
    if(tag==='br'){flush();return;}
    if(/^(div|p|li|tr|td|section|article)$/.test(tag)){for(const child of node.childNodes)walkNode(child);flush();return;}
    for(const child of node.childNodes)walkNode(child);
  }
  const main=doc.querySelector('#chord_area,.chordArea,#main,main')||doc.body;
  for(const child of main.childNodes)walkNode(child);
  flush();if(curSection.lines.length>0)sections.push(curSection);
  const cleaned=sections.filter(s=>s.lines.some(l=>l.chords||l.lyric));
  if(cleaned.length===0)return null;
  if(!cleaned[0].label)cleaned[0].label='イントロ';
  return{capo:capo||0,sections:cleaned};
}

// リンネのコードブック(chord-rinne.jp)専用抽出:
// <table class="lyric" id="scrollfield"> 内に
//   コード行: <tr id="row_N"> — 8拍分の<td>それぞれに <img src="daia/コード名.png" alt="コード名">
//   歌詞行:   直後の<tr>（idなし） — ルビ付き歌詞(<ruby>漢字<rt>ふりがな</rt></ruby>)、
//             セクション見出しは <img src="section/amero2.png"> のような画像
// が交互に並ぶ。コード名はalt属性から取得する（textContentにはコードが一切現れない）。
function extractRinneDOM(doc,capo){
  const table=doc.querySelector('table.lyric')||doc.getElementById('scrollfield');
  if(!table)return null;
  const SECTION_MAP={intro:'イントロ',amero:'Aメロ',bmero:'Bメロ',cmero:'Cメロ',dmero:'Dメロ',sabi:'サビ',daisabi:'大サビ',kansou:'間奏',outro:'アウトロ',ending:'エンディング',solo:'ソロ'};
  function mapSection(src){
    const m=(src||'').match(/section\/([a-z_-]+?)(\d*)\.(?:png|gif|jpg)/i);
    if(!m)return null;
    const base=SECTION_MAP[m[1].toLowerCase()]||m[1];
    return m[2]?base+m[2]:base;
  }
  // alt属性のコード名を正規化:
  //   N=空拍(スキップ) / no1,no2…=リピート記号(スキップ) / NC=N.C.
  //   ♯→# / XonY→X/Y(分数コード) / 末尾st・-5の後の数字=押さえ方バリエーション表記を除去
  function normRinneChord(alt){
    let s=(alt||'').trim();
    if(!s||s==='N'||/^no\d+$/i.test(s))return null;
    if(s==='NC')return 'N.C.';
    s=s.replace(/♯/g,'#').replace(/♭/g,'b');
    s=s.replace(/(\d)st$/,'$1');
    s=s.replace(/(-5)\d$/,'$1');
    const m=s.match(/^(.+?)on([A-G][#b]?)$/);
    if(m)s=m[1]+'/'+m[2];
    return s;
  }
  // 表の1行=2小節(8拍)固定で、歌詞はフレーズと無関係に行送りされるため、
  // セル(拍)単位のストリームとして再構成する:
  //   ・全角スペースのみのセル = 休符(フレーズ境界) → ここで改行
  //   ・セクション画像 → セクション切り替え
  //   ・息継ぎのない長いフレーズは全角14字相当を超えた行境界で折り返し
  //   ・コードは「直前までの歌詞の表示幅」から桁位置を計算して対応する歌詞の真上に配置
  //     (コード行は等幅フォントで全角1字≈半角2字幅として近似)
  const WRAP_COLS=28;
  const sections=[];let cur={label:'',lines:[]};
  let pendingChords=null;let bufCells=[];
  function colWidth(s){let w=0;for(const ch of s){w+=(ch.charCodeAt(0)<=0x7e||/[｡-ﾟ]/.test(ch))?1:2;}return w;}
  function flushLine(){
    if(bufCells.length===0)return;
    let chordLine='',lyricLine='';
    for(const c of bufCells){
      if(c.chord){
        const pos=colWidth(lyricLine);
        if(chordLine.length<pos)chordLine+=' '.repeat(pos-chordLine.length);
        else if(chordLine)chordLine+='  ';
        chordLine+=c.chord;
      }
      lyricLine+=c.text;
    }
    lyricLine=lyricLine.replace(/^[\s　]+|[\s　]+$/g,'');
    if(chordLine||lyricLine){
      // フレーズ末尾の短い断片(全角3字相当以下)は前の行に連結する(「の」だけの行を防ぐ)
      const last=cur.lines[cur.lines.length-1];
      if(lyricLine&&colWidth(lyricLine)<=6&&last&&last.lyric){
        const pad=colWidth(last.lyric);
        let base=last.chords||'';
        if(base.length<pad)base+=' '.repeat(pad-base.length);
        else if(base)base+='  ';
        if(chordLine)last.chords=base+chordLine;
        last.lyric+=lyricLine;
      }else{
        cur.lines.push({chords:chordLine,lyric:lyricLine});
      }
    }
    bufCells=[];
  }
  function pushSection(label){flushLine();if(cur.lines.length>0||cur.label)sections.push(cur);cur={label:label||'',lines:[]};}
  function emitInstrumental(chords){
    flushLine();
    const cs=(chords||[]).filter(Boolean);
    if(cs.length)cur.lines.push({chords:cs.join('  '),lyric:''});
  }
  for(const tr of table.querySelectorAll('tr')){
    const chordImgs=tr.querySelectorAll('img[src*="daia/"]');
    if(chordImgs.length>0){
      if(pendingChords)emitInstrumental(pendingChords);
      pendingChords=[...chordImgs].map(im=>normRinneChord(im.getAttribute('alt')));
      continue;
    }
    // 歌詞行: セクション画像を検出し、空白のみのルビ(セクション画像の付属)→rt/rp→画像の順に除去
    const secImg=tr.querySelector('img[src*="section/"]');
    const label=secImg?mapSection(secImg.getAttribute('src')):null;
    const clone=tr.cloneNode(true);
    clone.querySelectorAll('ruby').forEach(r=>{
      const base=[...r.childNodes].filter(n=>n.nodeName!=='RT'&&n.nodeName!=='RP').map(n=>n.textContent||'').join('');
      if(!base.replace(/[\s　]/g,''))r.remove();
    });
    clone.querySelectorAll('rt,rp,img').forEach(el=>el.remove());
    // レイアウト由来の改行/タブ/nbspのみ除去し、歌詞中のスペース(休符表現)は保持する
    const tds=[...clone.querySelectorAll('td')];
    const frags=tds.map(td=>(td.textContent||'').replace(/[\n\r\t\u00a0]+/g,''));
    const chords=pendingChords||[];pendingChords=null;
    if(label)pushSection(label);
    if(!frags.some(f=>f.replace(/[\s　]/g,''))){
      emitInstrumental(chords);   // 歌詞のない行(イントロ・間奏等)は単独のコード行に
      continue;
    }
    const n=Math.max(chords.length,tds.length);
    for(let i=0;i<n;i++){
      const text=frags[i]||'';
      const isRest=text.length>0&&!text.replace(/[\s　]/g,'');
      if(isRest&&bufCells.length>0)flushLine();
      bufCells.push({chord:chords[i]||'',text:isRest?'':text});
    }
    if(colWidth(bufCells.map(c=>c.text).join(''))>=WRAP_COLS)flushLine();
  }
  if(pendingChords)emitInstrumental(pendingChords);
  flushLine();
  if(cur.lines.length>0||cur.label)sections.push(cur);
  const cleaned=sections.filter(s=>s.lines.some(l=>l.chords||l.lyric));
  if(cleaned.length===0||!cleaned.some(s=>s.lines.some(l=>l.chords)))return null;
  if(!cleaned[0].label)cleaned[0].label='イントロ';
  return{capo:capo||0,sections:cleaned};
}

function showResultsList(query,candidates){
  document.getElementById('results-query').textContent='「'+query+'」の検索結果 '+candidates.length+'件';
  const list=document.getElementById('results-list');list.innerHTML='';
  candidates.forEach((c,i)=>{
    const item=document.createElement('div');item.className='result-item';
    const cwBadge=c.chordWikiUrl?'<span style="font-size:9px;background:#c8a96e22;border:1px solid #c8a96e44;color:var(--gold);border-radius:8px;padding:1px 6px;margin-left:6px">ChordWiki</span>':'';
    item.innerHTML='<div class="result-num">'+(i+1)+'</div><div class="result-info"><div class="result-title">'+esc(c.title||'')+cwBadge+'</div><div class="result-artist">'+esc(c.artist||'')+'</div><div class="result-meta">'+(c.year?c.year+'年  ':'')+esc(c.genre||'')+(c.bpm?'  ♩ '+c.bpm+' BPM':'')+'</div></div><div class="result-arrow">›</div>';
    item.onclick=()=>selectCandidate(c);list.appendChild(item);

function selectCandidate(info){
  if(info._libId){openLibrarySong(info._libId);return;}
  songInfo=info;baseSpeed=bpmSpd(info.bpm||120);
  document.getElementById('confirm-title').textContent=info.title;
  document.getElementById('confirm-artist').textContent=info.artist||'（アーティスト未確認）';
  document.getElementById('confirm-year').textContent=info.year?info.year+'年':'';
  document.getElementById('confirm-genre').textContent=info.genre||'';
  document.getElementById('confirm-bpm').textContent=info.bpm?'♩ '+info.bpm+' BPM → '+bpmSpd(info.bpm)+' px/sec':'';
  document.getElementById('confirm-error').textContent='';
  showScreen('confirm');
}

      :'「'+songInfo.title+'」'+(songInfo.artist?' '+songInfo.artist:'')+'のギターコード譜を ja.chordwiki.org で検索し、見つかったページの内容を忠実にJSON化してください。\n\n出力形式（マークダウン不要、JSONのみ）:\n{"capo":0,"sections":[{"label":"イントロ","lines":[{"chords":"Em7  G/B","lyric":""},{"chords":"Em7","lyric":"歌詞"}]}]}\n\n・ページに書かれている内容のみ、推測や創作は厳禁\n・全セクション・全歌詞を漏らさない';
    const result=await callGemini([{role:'user',content:prompt}],'Use Google Search to access the chord sheet page. Extract chord and lyric data EXACTLY as written on the actual page. NEVER invent, summarize, or paraphrase content. Return ONLY complete valid JSON.',true);
    let data=null;
    const txt=result.text.replace(/```json/g,'').replace(/```/g,'').trim();

    if(!data||!data.sections||data.sections.length===0){
      const q2=encodeURIComponent(songInfo.title+' '+songInfo.artist);
      document.getElementById('confirm-error').innerHTML='⚠ コード譜を取得できませんでした。<br><a href="https://ja.chordwiki.org/search.html?q='+q2+'" target="_blank" style="color:var(--gold)">→ ChordWikiで検索 ↗</a>';
      showScreen('confirm');return;

}

    const result=await callGemini([{role:'user',content:prompt}],'You are a guitar chord chart assistant. Search the web for guitar chord data from a DIFFERENT source than before. Reply ONLY with complete raw JSON. No markdown.',true);

}

      const siteLabel=primary.title?primary.title.split(/[\|\-]/)[0].trim().slice(0,20):hostname;
      let html='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span style="color:var(--text-dim)">コード出典:</span><a href="'+primary.uri+'" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:#c8a96e22;border:1px solid #c8a96e55;color:var(--gold);font-family:Space Mono,monospace;font-size:11px;padding:3px 10px;border-radius:20px;text-decoration:none;font-weight:700">✓ '+siteLabel+' <span style="opacity:.5">↗</span></a>';
      if(sources.length>1){html+='<span style="color:var(--text-dim)">+</span>'+sources.slice(1,3).map(s=>{const h=(()=>{try{return new URL(s.uri).hostname.replace('www.','')}catch{return s.uri}})();return'<a href="'+s.uri+'" target="_blank" style="color:var(--text-dim);font-size:11px;text-decoration:underline">'+h+'</a>';}).join(', ');}

      srcDiv.style.display='';

      srcDiv.innerHTML='<span style="color:var(--text-dim);font-size:11px">⚠ 参照元不明 — <a href="https://ja.chordwiki.org/search.html?q='+encodeURIComponent(songInfo.title+' '+songInfo.artist)+'" target="_blank" style="color:var(--gold)">ChordWikiで確認 ↗</a></span>';

  });

function buildChordText(si,cd){
  const lines=['♩ '+si.title+' / '+si.artist];
  if(cd.capo&&cd.capo>0)lines.push('🎸 Capo '+cd.capo+'フレット');
  lines.push('');
  (cd.sections||[]).forEach(sec=>{lines.push('【'+sec.label+'】');(sec.lines||[]).forEach(l=>{if(l.chords)lines.push(l.chords);if(l.lyric)lines.push(l.lyric);if(l.chords||l.lyric)lines.push('');});});
  return lines.join('\n');
}
function copyAsText(){if(!songInfo||!currentChordData){showToast('コード譜がありません');return;}doCopy(buildChordText(songInfo,currentChordData),'📋 コピーしました！LINEやメモに貼り付けてください');}
function copyFavoriteText(id){const fav=getFavorites().find(f=>f.id===id);if(!fav)return;doCopy(buildChordText(fav.songInfo,fav.chordData),'📋 コピーしました！');}
function doCopy(text,msg){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:0;left:0;width:2em;height:2em;padding:0;border:none;outline:none;background:transparent';document.body.appendChild(ta);ta.focus();ta.select();
  let ok=false;try{ok=document.execCommand('copy');}catch(e){}document.body.removeChild(ta);
  if(ok)showToast(msg);
  else if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).then(()=>showToast(msg)).catch(()=>window.prompt('コピーしてください（Ctrl+A → Ctrl+C）:',text));
  else window.prompt('コピーしてください（Ctrl+A → Ctrl+C）:',text);
}

function saveFavorites(favs){lsSetJSON('cs_favorites',favs)}
function isFavorited(){if(!songInfo)return false;return getFavorites().some(f=>f.songInfo.title===songInfo.title&&f.songInfo.artist===songInfo.artist);}
function updateFavBtn(){const btn=document.getElementById('fav-btn');if(!btn)return;if(isFavorited()){btn.textContent='★ お気に入り済み';btn.classList.add('fav-saved');}else{btn.textContent='☆ お気に入りに追加';btn.classList.remove('fav-saved');}}
function toggleFavorite(){
  if(!songInfo||!currentChordData)return;
  let favs=getFavorites();const idx=favs.findIndex(f=>f.songInfo.title===songInfo.title&&f.songInfo.artist===songInfo.artist);
  if(idx>=0){favs.splice(idx,1);saveFavorites(favs);updateFavBtn();showToast('お気に入りから削除しました');}
  else{favs.unshift({id:Date.now(),songInfo:{...songInfo},chordData:{...currentChordData},savedAt:new Date().toLocaleDateString('ja-JP')});saveFavorites(favs);updateFavBtn();showToast('★ お気に入りに追加しました！');}
}
function showFavorites(){
  const favs=getFavorites();const list=document.getElementById('fav-list');list.innerHTML='';
  if(favs.length===0){list.innerHTML='<div class="fav-empty"><div style="font-size:32px">♪</div><div>お気に入りはまだありません</div><div style="font-size:12px;color:var(--text-dim)">コード譜を表示してから ☆ ボタンで保存できます</div></div>';}
  else{favs.forEach(f=>{const item=document.createElement('div');item.className='fav-item';item.innerHTML='<div class="fav-item-info"><div class="fav-item-title">'+esc(f.songInfo.title)+'</div><div class="fav-item-artist">'+esc(f.songInfo.artist||'')+'</div><div class="fav-item-meta">'+(f.songInfo.bpm?'♩ '+f.songInfo.bpm+' BPM':'')+(f.chordData.capo?'  🎸 Capo '+f.chordData.capo:'')+'  📅 '+f.savedAt+'</div></div><button class="fav-share" onclick="event.stopPropagation();copyFavoriteText('+f.id+')">📋 コピー</button><button class="fav-delete" onclick="event.stopPropagation();deleteFavorite('+f.id+')" title="削除">✕</button>';item.onclick=()=>loadFavorite(f.id);list.appendChild(item);});}
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-favorites').classList.add('active');
  document.getElementById('back-btn').style.display='none';
  document.getElementById('fav-nav-btn').style.display='none';
}
function loadFavorite(id){const fav=getFavorites().find(f=>f.id===id);if(!fav)return;songInfo=fav.songInfo;currentChordData=fav.chordData;currentSources=null;isViewingFavorite=true;renderDisplay(fav.chordData,null,true);showScreen('display');}
function deleteFavorite(id){let favs=getFavorites();favs=favs.filter(f=>f.id!==id);saveFavorites(favs);showFavorites();showToast('削除しました');}

function toggleScroll(){scrolling?stopScroll():startScroll()}
let _scrollAccum=0;
function startScroll(){
  scrolling=true;_scrollAccum=0;
  const btn=document.getElementById('scroll-toggle');if(btn)btn.textContent='\u23f8 停止';
  if(animId)clearInterval(animId);
  animId=setInterval(()=>{
    if(!scrolling){stopScroll();return;}
    const el=document.getElementById('lyrics-outer');if(!el)return;
    _scrollAccum+=baseSpeed*speedMult*(1/60);
    if(_scrollAccum>=1){const px=Math.floor(_scrollAccum);el.scrollTop=el.scrollTop+px;_scrollAccum-=px;}
    if(el.scrollTop+el.clientHeight>=el.scrollHeight-2)stopScroll();
  },Math.round(1000/60));
}
function stopScroll(){
  scrolling=false;_scrollAccum=0;
  const btn=document.getElementById('scroll-toggle');if(btn)btn.textContent='\u25b6 自動スクロール';
  if(animId){clearInterval(animId);animId=null;}
}
function setMult(btn){document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');speedMult=parseFloat(btn.dataset.m);}

// ── Chord Diagram DB ──────────────────────────────────────────
// frets: [E(6弦=低音), A, D, G, B, e(1弦=高音)]
// -1=ミュート  0=開放  N=フレット番号
// baseFret: 図の開始フレット(省略=1)
// barre: {fret, from(弦index 0=E低音), to(省略=全弦)}
const CHORD_DB = {
  // ── C ──────────────────────────────────────────────
  'C':          {frets:[-1,3,2,0,1,0]},
  'CM7':        {frets:[-1,3,2,0,0,0]},
  'Cmaj7':      {frets:[-1,3,2,0,0,0]},
  'CM9':        {frets:[-1,3,2,0,3,0]},
  'C9':         {frets:[-1,3,2,3,3,-1]},
  'Cm':         {frets:[-1,3,5,5,4,3],baseFret:3,barre:{fret:3,from:1}},
  // ── D ──────────────────────────────────────────────
  'D':          {frets:[-1,-1,0,2,3,2]},
  'Dm':         {frets:[-1,-1,0,2,3,1]},
  'D7':         {frets:[-1,-1,0,2,1,2]},
  'D7/F#':      {frets:[2,0,0,2,1,2]},
  'DM7':        {frets:[-1,-1,0,2,2,2]},
  'Dmaj7':      {frets:[-1,-1,0,2,2,2]},
  'D6/F#':      {frets:[2,0,0,2,0,2]},
  'D/F#':       {frets:[2,0,0,2,3,2]},
  'Dsus4':      {frets:[-1,-1,0,2,3,3]},
  'Ddim':       {frets:[-1,-1,0,1,0,1]},
  // ── E / Eb ─────────────────────────────────────────
  'E':          {frets:[0,2,2,1,0,0]},
  'Eb':         {frets:[-1,6,5,3,4,3],baseFret:3},
  'Em':         {frets:[0,2,2,0,0,0]},
  'Em7':        {frets:[0,2,2,0,3,0]},
  'E7':         {frets:[0,2,0,1,0,0]},
  // ── F ──────────────────────────────────────────────
  'F':          {frets:[1,3,3,2,1,1],barre:{fret:1,from:0}},
  'FM7':        {frets:[-1,-1,3,2,1,0]},
  'Fmaj7':      {frets:[-1,-1,3,2,1,0]},
  'F#m7':       {frets:[2,4,4,4,2,2],baseFret:2,barre:{fret:2,from:0}},
  'F#7':        {frets:[2,4,2,3,2,2],baseFret:2,barre:{fret:2,from:0}},
  'F#dim':      {frets:[-1,-1,4,5,4,5],baseFret:4},
  // ── G ──────────────────────────────────────────────
  'G':          {frets:[3,2,0,0,0,3]},
  'Gm':         {frets:[3,5,5,3,3,3],barre:{fret:3,from:0}},
  'G7':         {frets:[3,2,0,0,0,1]},
  'GM7':        {frets:[3,2,0,0,0,2]},
  'Gmaj7':      {frets:[3,2,0,0,0,2]},
  'G/B':        {frets:[-1,2,0,0,0,3]},
  'G/D':        {frets:[-1,-1,0,0,0,3]},
  // ── A ──────────────────────────────────────────────
  'A':          {frets:[-1,0,2,2,2,0]},
  'Am':         {frets:[-1,0,2,2,1,0]},
  'Am7':        {frets:[-1,0,2,0,1,0]},
  'Am7(b5)/Eb': {frets:[-1,-1,1,2,1,0]},
  'A7':         {frets:[-1,0,2,0,2,0]},
  'AM7':        {frets:[-1,0,2,1,2,0]},
  // ── B ──────────────────────────────────────────────
  'B':          {frets:[-1,2,4,4,4,2],baseFret:2,barre:{fret:2,from:1}},
  'Bm':         {frets:[-1,2,4,4,3,2],baseFret:2,barre:{fret:2,from:1}},
  'Bm7':        {frets:[-1,2,4,2,3,2],baseFret:2,barre:{fret:2,from:1}},
  'B7':         {frets:[-1,2,1,2,0,2]},
  'B/D#':       {frets:[6,-1,4,4,4,-1],baseFret:4,barre:{fret:4,from:1,to:3}},
  // ── C# ─────────────────────────────────────────────
  'C#m':        {frets:[4,4,6,6,5,4],baseFret:4,barre:{fret:4,from:0}},
};

function buildChordSVG(name){
  const ch=CHORD_DB[name];if(!ch)return null;
  const W=218,H=168,pl=42,pt=16,sg=26,fg=42,dr=9;
  const strings=6,fretCount=4;
  const base=ch.baseFret||1;const showNut=base===1;
  const strLabels=['e','B','G','D','A','E'];
  const strY=i=>pt+(strings-1-i)*sg;
  let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<rect width="${W}" height="${H}" fill="#1a1208" rx="12"/>`;
  for(let i=0;i<strings;i++){
    const y=pt+i*sg;
    s+=`<text x="6" y="${y+4}" fill="#c8a96e66" font-size="10" font-family="monospace">${strLabels[i]}</text>`;
    s+=`<line x1="${pl}" y1="${y}" x2="${pl+fretCount*fg}" y2="${y}" stroke="#c8a96e44" stroke-width="1.5"/>`;
  }
  for(let f=0;f<=fretCount;f++){
    const x=pl+f*fg,isNut=showNut&&f===0;
    s+=`<line x1="${x}" y1="${pt}" x2="${x}" y2="${pt+(strings-1)*sg}" stroke="${isNut?'#e8e0d0':'#c8a96e33'}" stroke-width="${isNut?4:1.5}"/>`;
  }
  if(!showNut)s+=`<text x="${pl+fg*0.45}" y="${pt+(strings-1)*sg+16}" fill="#c8a96e" font-size="11" font-family="monospace" text-anchor="middle">${base}fr</text>`;
  if(ch.barre){
    const bx=pl+(ch.barre.fret-base+0.5)*fg;
    const fromRow=strY(ch.barre.from||0);
    const toRow=strY(ch.barre.to!==undefined?ch.barre.to:strings-1);
    const by1=Math.min(fromRow,toRow),by2=Math.max(fromRow,toRow);
    s+=`<rect x="${bx-dr}" y="${by1-dr*0.5}" width="${dr*2}" height="${by2-by1+dr}" fill="#c8a96e" rx="${dr}"/>`;
  }
  for(let i=0;i<strings;i++){
    const y=strY(i),fret=ch.frets[i],mx=pl-13;
    if(fret<0){const d=4;s+=`<line x1="${mx-d}" y1="${y-d}" x2="${mx+d}" y2="${y+d}" stroke="#e88060" stroke-width="2" stroke-linecap="round"/><line x1="${mx+d}" y1="${y-d}" x2="${mx-d}" y2="${y+d}" stroke="#e88060" stroke-width="2" stroke-linecap="round"/>`;}
    else if(fret===0)s+=`<circle cx="${mx}" cy="${y}" r="5" fill="none" stroke="#c8a96e88" stroke-width="1.5"/>`;
  }
  for(let i=0;i<strings;i++){
    const fret=ch.frets[i];
    if(fret>0){
      const x=pl+(fret-base+0.5)*fg,y=strY(i);
      const barre=ch.barre;
      const cov=barre&&barre.fret===fret&&i>=(barre.from||0)&&i<=(barre.to!==undefined?barre.to:strings-1);
      if(!cov)s+=`<circle cx="${x}" cy="${y}" r="${dr}" fill="#c8a96e"/>`;
    }
  }
  s+='</svg>';return s;
}

function chordSpans(text){
  if(!text)return'';
  return text.split(/(\s+)/).map(part=>{
    if(/^\s+$/.test(part))return part;
    return`<span class="chord-tap" onclick="showChordDiagram('${part}')">${esc(part)}</span>`;
  }).join('');
}

function showChordDiagram(name){
  document.getElementById('chord-modal-name').textContent=name;
  const svg=buildChordSVG(name);
  const diagramEl=document.getElementById('chord-modal-diagram');
  if(svg)diagramEl.innerHTML=svg;
  else diagramEl.innerHTML='<div class="chord-modal-nodata">コード図データなし</div>';
  document.getElementById('chord-modal').classList.add('show');
}
function closeChordModal(e){
  if(!e||e.target===document.getElementById('chord-modal')||e.type==='click')
    document.getElementById('chord-modal').classList.remove('show');
}
</script>

<div id="chord-modal" onclick="closeChordModal(event)">
  <div class="chord-modal-card" onclick="event.stopPropagation()">
    <div class="chord-modal-name" id="chord-modal-name"></div>
    <div id="chord-modal-diagram"></div>
    <button class="chord-modal-close" onclick="closeChordModal()">閉じる</button>
  </div>
</div>
