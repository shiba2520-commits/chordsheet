<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordSheet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8a96e;--gold-dim:#c8a96e55;--gold-faint:#c8a96e18;--bg:#0f0c08;--text:#e8e0d0;--text-dim:#e8e0d055;--text-mid:#e8e0d088;--red:#e88060;--purple:#c4a0e8}
html,body{height:100%;background:var(--bg);background-image:radial-gradient(ellipse at 20% 20%,#1f1508 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,#120d04 0%,transparent 60%);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden;position:fixed;width:100%}
#app{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--gold-faint);flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.logo-icon{font-size:22px;color:var(--gold)}
.logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
.hdr-btns{display:flex;gap:6px;align-items:center}
.screen{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;overflow:hidden;animation:fadeIn .4s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero-jp{display:block;font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(24px,4vw,46px);letter-spacing:.04em}
.hero-en{display:block;font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(36px,7vw,72px);color:var(--gold);letter-spacing:-.02em;line-height:1}
.hero-sub{color:var(--text-dim);font-size:13px;margin:10px 0 28px;letter-spacing:.06em}
.igroup{width:100%;max-width:500px;display:flex;flex-direction:column;gap:10px}
input[type=text]{background:#ffffff08;border:1px solid #c8a96e33;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;padding:13px 18px;border-radius:6px;outline:none;transition:border .2s;width:100%}
input[type=text]:focus{border-color:#c8a96e88;background:#ffffff10}
input[type=text]::placeholder{color:var(--text-dim)}
.key-hint{font-size:12px;color:var(--text-dim);line-height:1.7}
.key-hint a{color:var(--gold);text-decoration:none}
.model-row{display:flex;gap:8px}
select{flex:1;background:#1a1410;border:1px solid #c8a96e33;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:10px 14px;border-radius:6px;outline:none;cursor:pointer}
select option{background:#1a1410}
.btn-primary{background:linear-gradient(135deg,#c8a96e,#a07840);color:#1a1208;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.08em;border:none;border-radius:4px;padding:13px 28px;cursor:pointer;transition:filter .2s;width:100%}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:none;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.06em;border-radius:4px;padding:9px 16px;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn-ghost:hover{background:#c8a96e11}
.btn-ghost:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{font-size:11px;padding:7px 12px;opacity:.7}
.btn-row{display:flex;gap:10px;margin-top:18px}
.btn-row .btn-ghost,.btn-row .btn-primary{flex:1}
.card{background:#ffffff06;border:1px solid #c8a96e22;border-radius:12px;padding:26px 30px;width:100%;max-width:480px}
.card-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;opacity:.8;margin-bottom:16px}
.confirm-bar{border-left:3px solid var(--gold);padding-left:16px}
.confirm-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;line-height:1.2;margin-bottom:5px}
.confirm-artist{font-size:14px;color:var(--text-mid);margin-bottom:10px}
.confirm-meta{display:flex;flex-wrap:wrap;gap:10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim)}
.bpm-badge{color:var(--gold)}
.spinner{width:34px;height:34px;border:3px solid #c8a96e33;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Space Mono',monospace;color:var(--gold);font-size:13px;letter-spacing:.1em}
.loading-sub{color:var(--text-dim);font-size:12px;margin-top:7px}
.msg{font-size:12px;margin-top:10px;text-align:center;line-height:1.5;min-height:18px}
.error{color:var(--red)}
/* ── Display screen ── */
#screen-display{padding:0;align-items:stretch;justify-content:flex-start}
.song-header{padding:14px 24px 10px;border-bottom:1px solid #c8a96e12;flex-shrink:0}
.song-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.song-artist{color:var(--text-dim);font-size:12px;margin-top:2px}
.song-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.bpm-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);background:#c8a96e15;border:1px solid #c8a96e33;border-radius:20px;padding:2px 10px}
.capo-tag{display:none;font-family:'Space Mono',monospace;font-size:10px;color:var(--purple);background:#9b6fd422;border:1px solid #9b6fd444;border-radius:20px;padding:2px 10px}
.controls{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:8px 24px;background:#ffffff04;border-bottom:1px solid #c8a96e10;flex-shrink:0}
.speed-group{display:flex;align-items:center;gap:5px}
.speed-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-right:3px}
.speed-btn{background:none;border:1px solid #c8a96e44;color:#c8a96e99;font-family:'Space Mono',monospace;font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;transition:all .2s}
.speed-btn:hover,.speed-btn.active{background:#c8a96e22;border-color:var(--gold);color:var(--gold)}
.scroll-btn{background:linear-gradient(135deg,#c8a96e,#a07840);color:#1a1208;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.08em;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;transition:filter .2s}
.scroll-btn:hover{filter:brightness(1.1)}
.action-bar{display:flex;gap:8px;padding:8px 24px;background:#ffffff03;border-bottom:1px solid #c8a96e08;flex-shrink:0;flex-wrap:wrap;align-items:center}
.action-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid #c8a96e33;color:var(--text-mid);font-family:'Space Mono',monospace;font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
.action-btn:hover{background:#c8a96e11;border-color:var(--gold-dim);color:var(--text)}
.action-btn.fav-saved{border-color:#c8a96e;color:var(--gold);background:#c8a96e11}
.action-btn.reroll-btn:hover{background:#ffffff08}
#chord-sources{display:none;padding:8px 24px;background:#ffffff03;border-bottom:1px solid #c8a96e08;flex-shrink:0;font-size:11px}
.lyrics-outer{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.lyrics-inner{padding:20px 24px;max-width:700px;margin:0 auto}
.section-label{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold);font-size:13px;letter-spacing:.15em;text-transform:uppercase;margin:20px 0 8px;opacity:.8}
.line-block{margin-bottom:11px}
.chord-line{font-family:'Space Mono',monospace;color:var(--gold);font-size:13px;letter-spacing:.08em;min-height:18px;white-space:pre}
.lyric-line{font-size:16px;line-height:1.6;letter-spacing:.04em}
.lyrics-end{height:80px}
/* ── Favorites screen ── */
#screen-favorites{padding:0;align-items:stretch;justify-content:flex-start}
.fav-header{padding:16px 24px;border-bottom:1px solid var(--gold-faint);flex-shrink:0;display:flex;align-items:center;gap:12px}
.fav-title-text{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;flex:1}
.fav-list{flex:1;overflow-y:auto;padding:12px}
.fav-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-dim);gap:10px;font-size:14px}
.fav-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid #c8a96e18;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .2s;background:#ffffff04}
.fav-item:hover{background:#c8a96e0a;border-color:#c8a96e33}
.fav-item-info{flex:1;min-width:0}
.fav-item-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-item-artist{font-size:12px;color:var(--text-dim);margin-top:2px}
.fav-item-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:4px}
.fav-delete{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .2s;flex-shrink:0}
.fav-delete:hover{color:var(--red);background:#e8806011}
.fav-share{background:none;border:1px solid #c8a96e33;color:var(--gold);font-family:'Space Mono',monospace;font-size:10px;padding:4px 8px;border-radius:12px;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap}
.fav-share:hover{background:#c8a96e11}
/* ── Shared view banner ── */
.shared-banner{background:#4a2e6e33;border-bottom:1px solid #9b6fd433;padding:8px 24px;flex-shrink:0;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--purple);font-family:'Space Mono',monospace}
/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1410;border:1px solid #c8a96e44;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;padding:10px 20px;border-radius:8px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
.result-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid #c8a96e18;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .2s;background:#ffffff04}
.result-item:hover{background:#c8a96e0a;border-color:#c8a96e44}
.result-num{font-family:'Space Mono',monospace;font-size:13px;color:var(--gold);opacity:.6;width:20px;flex-shrink:0;text-align:center}
.result-info{flex:1;min-width:0}
.result-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700}
.result-artist{font-size:13px;color:var(--text-mid);margin-top:2px}
.result-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:4px}
.result-arrow{color:var(--gold-dim);font-size:18px;flex-shrink:0}
@media print{
  .header,.controls,.action-bar,#chord-sources,.speed-btn,.scroll-btn,#back-btn,#fav-nav-btn,button,#toast,.shared-banner{display:none!important}
  body{background:#fff!important;color:#000!important;overflow:auto!important}
  #app{height:auto!important}
  .screen{display:none!important}
  #screen-display{display:block!important;height:auto!important;overflow:visible!important}
  .lyrics-outer{overflow:visible!important;height:auto!important}
  .song-header{border:none!important;padding:0 0 8px!important}
  .song-title{color:#000!important;font-size:20px!important}
  .song-artist{color:#555!important}
  .bpm-tag,.capo-tag{background:#eee!important;color:#333!important;border-color:#ccc!important}
  .section-label{color:#666!important;font-size:11px!important}
  .chord-line{color:#c8a96e!important;font-size:11px!important}
  .lyric-line{color:#000!important;font-size:14px!important}
  .lyrics-end{display:none!important}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo" onclick="goHome()"><span class="logo-icon">♩</span><span class="logo-text">ChordSheet</span></div>
    <div class="hdr-btns">
      <button class="btn-ghost btn-sm" id="back-btn" style="display:none" onclick="goHome()">← 戻る</button>
      <button class="btn-ghost btn-sm" id="fav-nav-btn" onclick="showFavorites()" style="display:none">★ お気に入り</button>
      <button class="btn-ghost btn-sm" onclick="changeApiKey()">🔑 設定</button>
    </div>
  </div>

  <!-- API KEY -->
  <div class="screen active" id="screen-apikey">
    <div style="text-align:center;margin-bottom:26px">
      <span class="hero-jp">はじめに</span>
      <span class="hero-en" style="font-size:clamp(26px,5vw,50px)">APIキー設定</span>
    </div>
    <div class="igroup">
      <div style="position:relative">
        <input type="password" id="api-key-input" placeholder="APIキーを貼り付け" autocomplete="off" spellcheck="false" style="padding-right:48px">
        <button onclick="toggleKeyVisible()" id="eye-btn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gold);font-size:18px;padding:4px;opacity:0.7">👁</button>
      </div>
      <p class="key-hint">Google Gemini APIキーが必要です（無料）。<br><a href="https://aistudio.google.com/apikey" target="_blank">↗ aistudio.google.com/apikey</a> で発行できます。</p>
      <div class="model-row">
        <select id="model-select"><option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite（デフォルト）</option></select>
        <button class="btn-ghost" id="fetch-btn" onclick="fetchModels()" style="padding:9px 14px;font-size:12px">↻ モデル一覧</button>
      </div>
      <button class="btn-primary" onclick="saveApiKey()">保存して始める →</button>
      <p class="msg" id="apikey-msg"></p>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="screen" id="screen-search">
    <div style="text-align:center;margin-bottom:10px">
      <span class="hero-jp">コード譜を</span>
      <span class="hero-en">instantly.</span>
    </div>
    <p class="hero-sub">曲名を入力するだけで歌詞とギターコードを表示します</p>
    <div class="igroup">
      <input type="text" id="search-input" placeholder="曲名を入力（例: チェックのワンピース）" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn-primary" id="search-btn" onclick="doSearch()">検索する</button>
    </div>
    <p class="msg error" id="search-error"></p>
  </div>

  <!-- CONFIRM -->
  <div class="screen" id="screen-confirm">
    <div class="card">
      <p class="card-label">この曲で合っていますか？</p>
      <div class="confirm-bar">
        <div class="confirm-title" id="confirm-title"></div>
        <div class="confirm-artist" id="confirm-artist"></div>
        <div class="confirm-meta"><span id="confirm-year"></span><span id="confirm-genre"></span><span class="bpm-badge" id="confirm-bpm"></span></div>
      </div>
      <div class="btn-row">
        <button class="btn-ghost" onclick="goHome()">違う曲を探す</button>
        <button class="btn-primary" onclick="doConfirm()">この曲でOK ✓</button>
      </div>
    </div>
    <p class="msg error" id="confirm-error"></p>
  </div>

  <!-- SEARCH RESULTS -->
  <div class="screen" id="screen-results" style="padding:0;align-items:stretch;justify-content:flex-start">
    <div style="padding:16px 24px;border-bottom:1px solid var(--gold-faint);flex-shrink:0;display:flex;align-items:center;gap:12px">
      <div style="flex:1">
        <div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700">検索結果</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px" id="results-query"></div>
      </div>
      <button class="btn-ghost btn-sm" onclick="goHome()">← 戻る</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:12px" id="results-list"></div>
  </div>

  <!-- LOADING -->
  <div class="screen" id="screen-loading">
    <div class="spinner"></div>
    <p class="loading-text" id="loading-text">コード譜を検索中...</p>
    <p class="loading-sub" id="loading-sub"></p>
  </div>

  <!-- DISPLAY -->
  <div class="screen" id="screen-display">
    <div id="shared-banner" class="shared-banner" style="display:none">
      📎 保存済みコード譜を表示中 — <span id="shared-info"></span>
    </div>
    <div class="song-header">
      <div class="song-title" id="disp-title"></div>
      <div class="song-artist" id="disp-artist"></div>
      <div class="song-tags">
        <div class="bpm-tag" id="disp-bpm"></div>
        <div class="capo-tag" id="disp-capo"></div>
      </div>
    </div>
    <div class="controls">
      <div class="speed-group">
        <span class="speed-label">速度</span>
        <button class="speed-btn" data-m="0.3" onclick="setMult(this)">0.6</button>
        <button class="speed-btn" data-m="0.35" onclick="setMult(this)">0.7</button>
        <button class="speed-btn" data-m="0.4" onclick="setMult(this)">0.8</button>
        <button class="speed-btn" data-m="0.45" onclick="setMult(this)">0.9</button>
        <button class="speed-btn active" data-m="0.5" onclick="setMult(this)">1</button>
        <button class="speed-btn" data-m="0.55" onclick="setMult(this)">1.1</button>
        <button class="speed-btn" data-m="0.6" onclick="setMult(this)">1.2</button>
      </div>
      <button class="scroll-btn" id="scroll-toggle" onclick="toggleScroll()">▶ 自動スクロール</button>
    </div>
    <div class="action-bar" id="action-bar">
      <button class="action-btn reroll-btn" id="reroll-btn" onclick="doReroll()" style="display:none">🎲 コードを引き直す</button>
      <button class="action-btn" id="fav-btn" onclick="toggleFavorite()">☆ お気に入りに追加</button>
      <button class="action-btn" id="copy-btn" onclick="copyAsText()">📋 テキストでコピー</button>
      <button class="action-btn" id="print-btn" onclick="printChord()">🖨️ 印刷/PDF保存</button>
    </div>
    <div id="chord-sources"></div>
    <div class="lyrics-outer" id="lyrics-outer">
      <div class="lyrics-inner" id="lyrics-inner"></div>
    </div>
  </div>

  <!-- FAVORITES -->
  <div class="screen" id="screen-favorites">
    <div class="fav-header">
      <div class="fav-title-text">★ お気に入り</div>
      <button class="btn-ghost btn-sm" onclick="goHome()">← 戻る</button>
    </div>
    <div class="fav-list" id="fav-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Storage ──────────────────────────────────────────
function lsGet(k,d){try{return localStorage.getItem(k)||d||''}catch{return d||''}}
function lsSet(k,v){try{localStorage.setItem(k,v)}catch{}}
function lsGetJSON(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}
function lsSetJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ── State ─────────────────────────────────────────────
let apiKey=lsGet('cs_key');
let model=lsGet('cs_model','gemini-2.5-flash-lite');
let songInfo=null;
let currentChordData=null;
let currentSources=null;
let isViewingFavorite=false;
let scrolling=false,baseSpeed=40,speedMult=0.5,animId=null,lastTs=null;

// ── Hardcoded songs (always accurate) ────────────────

function findHardcoded(title, artist){
  const t=title.trim().replace(/\s+/g,'');
  const a=(artist||'').trim().toLowerCase().replace(/\s+/g,'');
  return HARDCODED_SONGS.find(s=>{
    const st=s.songInfo.title.trim().replace(/\s+/g,'');
    const sa=s.songInfo.artist.trim().toLowerCase().replace(/\s+/g,'');
    return st===t && sa===a;
  })||null;
}

async function fetchModels(){
  const key=document.getElementById('api-key-input').value.trim()||apiKey;
  if(!key){showMsg('先にAPIキーを入力してください','var(--red)');return}
  const btn=document.getElementById('fetch-btn');
  btn.disabled=true;btn.textContent='読込中...';
  try{
    const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models?key='+key+'&pageSize=100');
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const list=(d.models||[]).filter(m=>(m.supportedGenerationMethods||[]).includes('generateContent')&&m.name.includes('gemini'))
      .map(m=>({id:m.name.replace('models/',''),label:m.displayName||m.name.replace('models/','')}))
      .sort((a,b)=>b.id.localeCompare(a.id));
    const sel=document.getElementById('model-select');sel.innerHTML='';
    list.forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m.id;if(m.id===model)o.selected=true;sel.appendChild(o);});
    if(!sel.value&&list.length)sel.value=list[0].id;
    showMsg('✓ '+list.length+'件取得しました','var(--gold)');
  }catch(e){showMsg('取得失敗: '+e.message,'var(--red)')}
  finally{btn.disabled=false;btn.textContent='↻ モデル一覧'}
}

// ── Gemini API ────────────────────────────────────────
async function callGemini(msgs,sys,useSearch=false,attempt=0){
  const body={
    system_instruction:{parts:[{text:sys}]},
    contents:msgs.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]})),
    generationConfig:{maxOutputTokens:8192,temperature:0.3}
  };
  if(useSearch)body.tools=[{google_search:{}}];
  const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+apiKey,{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
  });
  const raw=await r.text();
  let d;try{d=JSON.parse(raw)}catch{throw new Error('パース失敗: '+raw.slice(0,80))}
  const errMsg=d?.error?.message||'';
  const isRetryable=!r.ok&&(r.status===429||r.status===503||errMsg.includes('high demand')||errMsg.includes('overload')||errMsg.includes('Resource exhausted'));
  if(isRetryable&&attempt<2){
    const wait=5000*(attempt+1);
    document.getElementById('loading-sub').textContent='混雑中のためリトライ中... ('+(attempt+1)+'/2)';
    await new Promise(res=>setTimeout(res,wait));
    return callGemini(msgs,sys,useSearch,attempt+1);
  }
  if(!r.ok||d.error)throw new Error(errMsg||'HTTP '+r.status);
  const parts=d.candidates?.[0]?.content?.parts||[];
  const text=parts.filter(p=>p.text&&!p.thought).map(p=>p.text).join('');
  const meta=d.candidates?.[0]?.groundingMetadata||{};
  const chunks=meta.groundingChunks||[];
  const sources=chunks.map(c=>c.web).filter(Boolean).map(w=>({title:w.title||'',uri:w.uri||''}));
  const searchQueries=meta.webSearchQueries||[];
  return {text,sources,searchQueries};
}
function pJSON(t){
  if(!t)return null;
  let c=t.replace(/```json|```/g,'').trim();
  try{return JSON.parse(c)}catch{}
  const s=c.indexOf('{'),e=c.lastIndexOf('}');
  if(s!==-1&&e>s)try{return JSON.parse(c.slice(s,e+1))}catch{}
  return null;
}
function bpmSpd(b){return Math.round((b/120)*40)}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  if(!q)return;
  const btn=document.getElementById('search-btn');
  btn.disabled=true;btn.textContent='検索中...';
  document.getElementById('search-error').textContent='';

      [{role:'user',content:'曲名「'+q+'」の情報をJSONのみで:\n{"title":"曲名","artist":"アーティスト","bpm":120,"year":2000,"genre":"ジャンル"}'}],
      'Reply ONLY with a raw JSON object, no markdown, no explanation.'
    );
    const info=pJSON(result.text);
    if(!info||!info.title)throw new Error('解析失敗: '+result.text.slice(0,60));
    songInfo=info;baseSpeed=bpmSpd(info.bpm||120);
    document.getElementById('confirm-title').textContent=info.title;
    document.getElementById('confirm-artist').textContent=info.artist||'';
    document.getElementById('confirm-year').textContent=info.year?info.year+'年':'';
    document.getElementById('confirm-genre').textContent=info.genre||'';
    document.getElementById('confirm-bpm').textContent=info.bpm?'♩ '+info.bpm+' BPM → '+bpmSpd(info.bpm)+' px/sec':'';
    document.getElementById('confirm-error').textContent='';
    showScreen('confirm');
  }catch(e){
    const m=e.message||'';
    if(m.toLowerCase().includes('key')||m.toLowerCase().includes('invalid')){changeApiKey()}
    else document.getElementById('search-error').textContent='エラー: '+m;
  }finally{btn.disabled=false;btn.textContent='検索する'}
}

// ── Copy / Print ─────────────────────────────────────
function buildChordText(si, cd){
  const lines=[];
  lines.push('♩ '+si.title+' / '+si.artist);
  if(cd.capo&&cd.capo>0) lines.push('🎸 Capo '+cd.capo+'フレット');
  lines.push('');
  (cd.sections||[]).forEach(sec=>{
    lines.push('【'+sec.label+'】');
    (sec.lines||[]).forEach(l=>{
      if(l.chords) lines.push(l.chords);
      if(l.lyric)  lines.push(l.lyric);
      if(l.chords||l.lyric) lines.push('');
    });
  });
  return lines.join('\n');
}

function copyAsText(){
  if(!songInfo||!currentChordData){ showToast('コード譜がありません'); return; }
  doCopy(buildChordText(songInfo, currentChordData), '📋 コピーしました！LINEやメモに貼り付けてください');
}

function copyFavoriteText(id){
  const fav=getFavorites().find(f=>f.id===id);
  if(!fav) return;
  doCopy(buildChordText(fav.songInfo, fav.chordData), '📋 コピーしました！');
}

function doCopy(text, msg){
  // file:// in Chrome: use textarea + execCommand
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;top:0;left:0;width:2em;height:2em;padding:0;border:none;outline:none;background:transparent';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  let ok=false;
  try{ ok=document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  if(ok){
    showToast(msg);
  } else if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast(msg)).catch(()=>window.prompt('コピーしてください（Ctrl+A → Ctrl+C）:',text));
  } else {
    window.prompt('コピーしてください（Ctrl+A → Ctrl+C）:',text);
  }
}

}
function toggleFavorite(){
  if(!songInfo||!currentChordData)return;
  let favs=getFavorites();
  const idx=favs.findIndex(f=>f.songInfo.title===songInfo.title&&f.songInfo.artist===songInfo.artist);
  if(idx>=0){
    favs.splice(idx,1);
    saveFavorites(favs);
    updateFavBtn();
    showToast('お気に入りから削除しました');
  }else{
    favs.unshift({id:Date.now(),songInfo:{...songInfo},chordData:{...currentChordData},savedAt:new Date().toLocaleDateString('ja-JP')});
    saveFavorites(favs);
    updateFavBtn();
    showToast('★ お気に入りに追加しました！');
  }
}

function showFavorites(){
  const favs=getFavorites();
  const list=document.getElementById('fav-list');
  list.innerHTML='';
  if(favs.length===0){
    list.innerHTML='<div class="fav-empty"><div style="font-size:32px">♪</div><div>お気に入りはまだありません</div><div style="font-size:12px;color:var(--text-dim)">コード譜を表示してから ☆ ボタンで保存できます</div></div>';
  }else{
    favs.forEach(f=>{
      const item=document.createElement('div');item.className='fav-item';
      item.innerHTML='<div class="fav-item-info"><div class="fav-item-title">'+esc(f.songInfo.title)+'</div><div class="fav-item-artist">'+esc(f.songInfo.artist||'')+'</div><div class="fav-item-meta">'+(f.songInfo.bpm?'♩ '+f.songInfo.bpm+' BPM':'')+(f.chordData.capo?'  🎸 Capo '+f.chordData.capo:'')+'  📅 '+f.savedAt+'</div></div>'
        +'<button class="fav-share" onclick="event.stopPropagation();copyFavoriteText('+f.id+')">📋 コピー</button>'
        +'<button class="fav-delete" onclick="event.stopPropagation();deleteFavorite('+f.id+')" title="削除">✕</button>';
      item.onclick=()=>loadFavorite(f.id);
      list.appendChild(item);
    });
  }
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-favorites').classList.add('active');
  document.getElementById('back-btn').style.display='none';
  document.getElementById('fav-nav-btn').style.display='none';
}

function loadFavorite(id){
  const fav=getFavorites().find(f=>f.id===id);
  if(!fav)return;
  songInfo=fav.songInfo;
  currentChordData=fav.chordData;
  currentSources=null;
  isViewingFavorite=true;
  renderDisplay(fav.chordData,null,true);
  showScreen('display');
}

function deleteFavorite(id){
  let favs=getFavorites();
  favs=favs.filter(f=>f.id!==id);
  saveFavorites(favs);
  showFavorites();
  showToast('削除しました');
}

// ── Share / iPhone ────────────────────────────────────
function buildShareUrl(songInfoObj,chordDataObj){
  const payload=JSON.stringify({songInfo:songInfoObj,chordData:chordDataObj});
  const encoded=btoa(encodeURIComponent(payload));
  return location.href.split('#')[0]+'#chord='+encoded;
}
function shareChord(){
  if(!songInfo||!currentChordData){showToast('先にコード譜を表示してください');return}
  const url=buildShareUrl(songInfo,currentChordData);
  navigator.clipboard.writeText(url).then(()=>{
    showToast('📋 URLをコピーしました！iPhoneのSafariで開いてください');
  }).catch(()=>{
    prompt('このURLをコピーしてiPhoneのSafariで開いてください:',url);
  });
}
function shareFavorite(id){
  const fav=getFavorites().find(f=>f.id===id);
  if(!fav)return;
  const url=buildShareUrl(fav.songInfo,fav.chordData);
  navigator.clipboard.writeText(url).then(()=>{
    showToast('📋 URLをコピーしました！');
  }).catch(()=>{
    prompt('このURLをコピーしてiPhoneのSafariで開いてください:',url);
  });
}

// ── Scroll ────────────────────────────────────────────
function toggleScroll(){scrolling?stopScroll():startScroll()}
let _scrollAccum=0;
function startScroll(){
  scrolling=true;_scrollAccum=0;
  const btn=document.getElementById('scroll-toggle');
  if(btn)btn.textContent='\u23f8 停止';
  if(animId){clearInterval(animId);}
  animId=setInterval(()=>{
    if(!scrolling){stopScroll();return;}
    const el=document.getElementById('lyrics-outer');
    if(!el)return;
    _scrollAccum+=baseSpeed*speedMult*(1/60);
    if(_scrollAccum>=1){
      const px=Math.floor(_scrollAccum);
      el.scrollTop=el.scrollTop+px;
      _scrollAccum-=px;
    }
    if(el.scrollTop+el.clientHeight>=el.scrollHeight-2){stopScroll();}
  },Math.round(1000/60));
}
function stopScroll(){
  scrolling=false;_scrollAccum=0;
  const btn=document.getElementById('scroll-toggle');
  if(btn)btn.textContent='\u25b6 自動スクロール';
  if(animId){clearInterval(animId);animId=null;}
}
function tick(){}
function setMult(btn){
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  speedMult=parseFloat(btn.dataset.m);
}
</script>
