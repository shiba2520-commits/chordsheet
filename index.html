<!DOCTYPE html>

<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChordSheet</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#c8a96e;--gold-dim:#c8a96e55;--gold-faint:#c8a96e18;--bg:#0f0c08;--text:#e8e0d0;--text-dim:#e8e0d055;--text-mid:#e8e0d088;--red:#e88060;--purple:#c4a0e8}
    html,body{height:100%;background:var(--bg);background-image:radial-gradient(ellipse at 20% 20%,#1f1508 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,#120d04 0%,transparent 60%);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100vh}
    .header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--gold-faint);flex-shrink:0}
    .logo{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
    .logo-icon{font-size:22px;color:var(--gold)}
    .logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
    .hdr-btns{display:flex;gap:6px;align-items:center}
    .screen{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;overflow:hidden;animation:fadeIn .4s ease}
    .screen.active{display:flex}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .hero-jp{display:block;font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(24px,4vw,46px);letter-spacing:.04em}
    .hero-en{display:block;font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(36px,7vw,72px);color:var(--gold);letter-spacing:-.02em;line-height:1}
    .hero-sub{color:var(--text-dim);font-size:13px;margin:10px 0 28px;letter-spacing:.06em}
    .igroup{width:100%;max-width:500px;display:flex;flex-direction:column;gap:10px}
    input[type=text]{background:#ffffff08;border:1px solid #c8a96e33;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;padding:13px 18px;border-radius:6px;outline:none;transition:border .2s;width:100%}
    input[type=text]:focus{border-color:#c8a96e88;background:#ffffff10}
    input[type=text]::placeholder{color:var(--text-dim)}
    .key-hint{font-size:12px;color:var(--text-dim);line-height:1.7}
    .key-hint a{color:var(--gold);text-decoration:none}
    .model-row{display:flex;gap:8px}
    select{flex:1;background:#1a1410;border:1px solid #c8a96e33;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:10px 14px;border-radius:6px;outline:none;cursor:pointer}
    select option{background:#1a1410}
    .btn-primary{background:linear-gradient(135deg,#c8a96e,#a07840);color:#1a1208;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.08em;border:none;border-radius:4px;padding:13px 28px;cursor:pointer;transition:filter .2s;width:100%}
    .btn-primary:hover{filter:brightness(1.1)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .btn-ghost{background:none;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.06em;border-radius:4px;padding:9px 16px;cursor:pointer;transition:background .2s;white-space:nowrap}
    .btn-ghost:hover{background:#c8a96e11}
    .btn-ghost:disabled{opacity:.4;cursor:not-allowed}
    .btn-sm{font-size:11px;padding:7px 12px;opacity:.7}
    .btn-row{display:flex;gap:10px;margin-top:18px}
    .btn-row .btn-ghost,.btn-row .btn-primary{flex:1}
    .card{background:#ffffff06;border:1px solid #c8a96e22;border-radius:12px;padding:26px 30px;width:100%;max-width:480px}
    .card-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;opacity:.8;margin-bottom:16px}
    .confirm-bar{border-left:3px solid var(--gold);padding-left:16px}
    .confirm-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;line-height:1.2;margin-bottom:5px}
    .confirm-artist{font-size:14px;color:var(--text-mid);margin-bottom:10px}
    .confirm-meta{display:flex;flex-wrap:wrap;gap:10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim)}
    .bpm-badge{color:var(--gold)}
    .spinner{width:34px;height:34px;border:3px solid #c8a96e33;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:18px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-family:'Space Mono',monospace;color:var(--gold);font-size:13px;letter-spacing:.1em}
    .loading-sub{color:var(--text-dim);font-size:12px;margin-top:7px}
    .msg{font-size:12px;margin-top:10px;text-align:center;line-height:1.5;min-height:18px}
    .error{color:var(--red)}
    /* ── Display screen ── */
    #screen-display{padding:0;align-items:stretch;justify-content:flex-start}
    .song-header{padding:14px 24px 10px;border-bottom:1px solid #c8a96e12;flex-shrink:0}
    .song-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
    .song-artist{color:var(--text-dim);font-size:12px;margin-top:2px}
    .song-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
    .bpm-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);background:#c8a96e15;border:1px solid #c8a96e33;border-radius:20px;padding:2px 10px}
    .capo-tag{display:none;font-family:'Space Mono',monospace;font-size:10px;color:var(--purple);background:#9b6fd422;border:1px solid #9b6fd444;border-radius:20px;padding:2px 10px}
    .controls{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:8px 24px;background:#ffffff04;border-bottom:1px solid #c8a96e10;flex-shrink:0}
    .speed-group{display:flex;align-items:center;gap:5px}
    .speed-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-right:3px}
    .speed-btn{background:none;border:1px solid #c8a96e44;color:#c8a96e99;font-family:'Space Mono',monospace;font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;transition:all .2s}
    .speed-btn:hover,.speed-btn.active{background:#c8a96e22;border-color:var(--gold);color:var(--gold)}
    .scroll-btn{background:linear-gradient(135deg,#c8a96e,#a07840);color:#1a1208;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.08em;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;transition:filter .2s}
    .scroll-btn:hover{filter:brightness(1.1)}
    .action-bar{display:flex;gap:8px;padding:8px 24px;background:#ffffff03;border-bottom:1px solid #c8a96e08;flex-shrink:0;flex-wrap:wrap;align-items:center}
    .action-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid #c8a96e33;color:var(--text-mid);font-family:'Space Mono',monospace;font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
    .action-btn:hover{background:#c8a96e11;border-color:var(--gold-dim);color:var(--text)}
    .action-btn.fav-saved{border-color:#c8a96e;color:var(--gold);background:#c8a96e11}
    .action-btn.reroll-btn:hover{background:#ffffff08}
    #chord-sources{display:none;padding:8px 24px;background:#ffffff03;border-bottom:1px solid #c8a96e08;flex-shrink:0;font-size:11px}
    .lyrics-outer{flex:1;overflow-y:auto}
    .lyrics-inner{padding:20px 24px;max-width:700px;margin:0 auto}
    .section-label{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold);font-size:13px;letter-spacing:.15em;text-transform:uppercase;margin:20px 0 8px;opacity:.8}
    .line-block{margin-bottom:11px}
    .chord-line{font-family:'Space Mono',monospace;color:var(--gold);font-size:13px;letter-spacing:.08em;min-height:18px;white-space:pre}
    .lyric-line{font-size:16px;line-height:1.6;letter-spacing:.04em}
    .lyrics-end{height:80px}
    /* ── Favorites screen ── */
    #screen-favorites{padding:0;align-items:stretch;justify-content:flex-start}
    .fav-header{padding:16px 24px;border-bottom:1px solid var(--gold-faint);flex-shrink:0;display:flex;align-items:center;gap:12px}
    .fav-title-text{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;flex:1}
    .fav-list{flex:1;overflow-y:auto;padding:12px}
    .fav-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-dim);gap:10px;font-size:14px}
    .fav-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid #c8a96e18;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .2s;background:#ffffff04}
    .fav-item:hover{background:#c8a96e0a;border-color:#c8a96e33}
    .fav-item-info{flex:1;min-width:0}
    .fav-item-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fav-item-artist{font-size:12px;color:var(--text-dim);margin-top:2px}
    .fav-item-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:4px}
    .fav-delete{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .2s;flex-shrink:0}
    .fav-delete:hover{color:var(--red);background:#e8806011}
    .fav-share{background:none;border:1px solid #c8a96e33;color:var(--gold);font-family:'Space Mono',monospace;font-size:10px;padding:4px 8px;border-radius:12px;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap}
    .fav-share:hover{background:#c8a96e11}
    /* ── Shared view banner ── */
    .shared-banner{background:#4a2e6e33;border-bottom:1px solid #9b6fd433;padding:8px 24px;flex-shrink:0;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--purple);font-family:'Space Mono',monospace}
